# 7. Hymission

unbind = $mod, TAB
unbind = $mod SHIFT, TAB

bindd = $mod,     TAB,        Toggle overview for all workspaces,     hymission:toggle,           forceall                   #"Toggle overview for all workspaces"
bindd = $mod,     A,          Toggle overview for current workspace,  hymission:open,             onlycurrentworkspace       #"Toggle overview for current workspace"

plugin {
  hymission {
    max_preview_scale = 0.75
    show_focus_indicator = false
    workspace_strip_anchor = left
    workspace_strip_gap = 32
    workspace_strip_thickness = 240
  }
}
