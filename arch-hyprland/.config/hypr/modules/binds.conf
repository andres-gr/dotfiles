#? ------- KEYBINDS_HYPRLAND_V_0_53 COMPATIBLE ----------------
#   This Config is compatible with keybinding changes in Hyprland v0.53+

#? ------- Grouping of binds for easier management ----------------
#  $d=[Group Name|Subgroup Name1|Subgroup Name2|...]

#? ------- Variables ----------------
$ALT_BROWSER    = chromium
$ALT_TERMINAL   = kitty
$BROWSER        = zen-browser
$EDITOR         = code --ozone-platform-hint=wayland --enable-features=UseOzonePlatform
$EXPLORER       = dolphin
$MENU           = fuzzel
$TERMINAL       = ghostty

#? ------- Modifiers ----------------
$mainMod              = SUPER
$altMod               = ALT
$ctrlMod              = CTRL
$shiftMod             = SHIFT
$mainAltCtrlMod       = SUPER ALT CTRL
$mainAltCtrlShiftMod  = SUPER ALT CTRL SHIFT
$mainAltMod           = SUPER ALT
$mainAltShiftMod      = SUPER ALT SHIFT
$mainCtrlMod          = SUPER CTRL
$mainCtrlShiftMod     = SUPER CTRL SHIFT
$mainShiftMod         = SUPER SHIFT
$altCtrlMod           = ALT CTRL
$altShiftCtrlMod      = ALT SHIFT CTRL
$altShiftMod          = ALT SHIFT
$ctrlShiftMod         = CTRL SHIFT

# тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
# Window Management
# тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА

$wm=Window Management
$d=[$wm]

bindd = $mainShiftMod,    Q,          $d Kill Focused Window,             forcekillactive
bindd = $mainMod,         W,          $d Close Focused Window,            killactive
# bindd = ALT,              F4,         $d Close Focused Window,            exec,            hyde-shell dontkillsteam
# bindd = $mainMod CTRL,    DELETE,     $d Kill Session,                    exec,            hyde-shell logout
bindd = $mainMod,         D,          $d Toggle Floating,                 togglefloating
bindd = $mainMod,         G,          $d Toggle Group,                    togglegroup
bindd = $shiftMod,        F11,        $d Toggle Fullscreen,               fullscreen
bindd = $mainMod,         RETURN,     $d Fullscreen,                      fullscreen,      1
bindd = $mainShiftMod,    RETURN,     $d Fullscreen (No Bar),             fullscreen,      0
# bindd = $mainMod ALT,     L,          $d Lock Screen,                     exec,            hyde-shell lock-session
# bindd = $mainMod CTRL,    RETURN,     $d Pin Window,                      exec,            hyde-shell windowpin
# bindd = $mainMod SHIFT,   BACKSPACE,  $d Logout Menu,                     exec,            hyde-shell logoutlaunch
# bindd = CTRL,             ESCAPE,     $d Toggle Waybar,                   exec,            hyde-shell waybar --hide
bindd = $mainShiftMod,    N,          $d Center Window,                   centerwindow,    1
bindd = $mainShiftMod,    M,          $d Maximize Window,                 resizeactive,    exact 95% 95%
bindd = $mainShiftMod,    M,          $d Maximize Window (Center),        centerwindow,    1
bindd = $mainShiftMod,    B,          $d Half Window,                     resizeactive,    exact 50% 75%
bindd = $mainShiftMod,    B,          $d Half Window (Center),            centerwindow,    1


$d=[$wm|Group Navigation]

bindd = $mainCtrlMod,     H,          $d Change Active Group Backwards,   changegroupactive, b
bindd = $mainCtrlMod,     L,          $d Change Active Group Forwards,    changegroupactive, f


$d=[$wm|Change Focus]

bindd = $mainMod,         LEFT,       $d Focus Left,                      movefocus,       l
bindd = $mainMod,         RIGHT,      $d Focus Right,                     movefocus,       r
bindd = $mainMod,         UP,         $d Focus Up,                        movefocus,       u
bindd = $mainMod,         DOWN,       $d Focus Down,                      movefocus,       d
bindd = $altMod,          TAB,        $d Cycle Focus,                     cyclenext
bindd = $altShiftMod,     TAB,        $d Cycle Focus,                     cyclenext,       prev
bindd = $mainMod,         H,          $d Focus Left,                      movefocus,       l
bindd = $mainMod,         L,          $d Focus Right,                     movefocus,       r
bindd = $mainMod,         K,          $d Focus Up,                        movefocus,       u
bindd = $mainMod,         J,          $d Focus Down,                      movefocus,       d


$d=[$wm|Move Window]

bindd = $mainShiftMod,    H,          $d Move Window Left,                movewindow,      l
bindd = $mainShiftMod,    L,          $d Move Window Right,               movewindow,      r
bindd = $mainShiftMod,    K,          $d Move Window Up,                  movewindow,      u
bindd = $mainShiftMod,    J,          $d Move Window Down,                movewindow,      d


$d=[$wm|Resize Active Window]

bindde = $mainShiftMod,   RIGHT,      $d Resize Window Right,             resizeactive,    30 0
bindde = $mainShiftMod,   LEFT,       $d Resize Window Left,              resizeactive,    -30 0
bindde = $mainShiftMod,   UP,         $d Resize Window Up,                resizeactive,    0 -30
bindde = $mainShiftMod,   DOWN,       $d Resize Window Down,              resizeactive,    0 30
bindde = $mainCtrlMod,    H,          $d Resize Window Left,              resizeactive,    -30 0
bindde = $mainCtrlMod,    L,          $d Resize Window Right,             resizeactive,    30 0
bindde = $mainCtrlMod,    K,          $d Resize Window Up,                resizeactive,    0 -30
bindde = $mainCtrlMod,    J,          $d Resize Window Down,              resizeactive,    0 30


$d=[$wm|Move Active Window Across Workspace]
$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive

bindde = $mainCtrlShiftMod,   LEFT,   $d Move Active Window Left,         exec,            $moveactivewindow -30 0 || hyprctl dispatch movewindow l
bindde = $mainCtrlShiftMod,   RIGHT,  $d Move Active Window Right,        exec,            $moveactivewindow 30 0 || hyprctl dispatch movewindow r
bindde = $mainCtrlShiftMod,   UP,     $d Move Active Window Up,           exec,            $moveactivewindow 0 -30 || hyprctl dispatch movewindow u
bindde = $mainCtrlShiftMod,   DOWN,   $d Move Active Window Down,         exec,            $moveactivewindow 0 30 || hyprctl dispatch movewindow d


$d=[$wm|Move & Resize With Mouse]

binddm = $mainMod,        mouse:272,  $d Hold To Move Window,             movewindow
binddm = $mainMod,        mouse:273,  $d Hold To Resize Window,           resizewindow
binddm = $mainMod,        Z,          $d Hold To Move Window,             movewindow
binddm = $mainShiftMod,   Z,          $d Hold To Resize Window,           resizewindow


$d=[$wm|Split Layout]

bindd = $mainAltMod,      BACKSLASH,  $d Toggle Split,                    togglesplit
bindd = $mainMod,         P,          $d Toggle Pseudo,                   pseudo


$d=[$wm|Opacity & Blur]

bindd = $mainMod,         U,          $d Toggle Opacity,                  setprop,         active opaque toggle
bindd = $mainAltMod,      U,          $d Toggle Blur,                     setprop,         active no_blur toggle

