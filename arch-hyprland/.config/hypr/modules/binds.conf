## ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ
## ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚ĖĄ‚Ėą

# see https://wiki.hyprland.org/configuring/keywords/ for more
# example binds, see https://wiki.hyprland.org/configuring/binds/ for more

#? ------- KEYBINDS_HYPRLAND_V_0_53 COMPATIBLE ----------------
#   This Config is compatible with keybinding changes in Hyprland v0.53+

#? ------- Variables ----------------
$ALT_BROWSER    = chromium
$ALT_TERMINAL   = kitty
$BROWSER        = zen-browser
$BTOP           = ghostty -e zsh -c btop
$EXPLORER       = dolphin
$MENU           = fuzzel
$TERMINAL       = _NO_TMUX=1 ghostty -e zsh
$YAZI           = ghostty -e zsh -c yazi

#? ------- Modifiers ----------------
$mod            = SUPER

#? ------- Scripts ------------------
$BASE_PATH = $HOME/.local/bin
$WORKSPACE_CLAMP = $BASE_PATH/hypr-workspace-clamp
$CLOSE_WINDOW = $BASE_PATH/dont-kill-steam
$SCREENSHOT = $BASE_PATH/screenshot-tool-agr


# 1. Window Management
bindd = $mod SHIFT,    Q,          Kill Focused Window,             forcekillactive                  #"Kill Focused Window"
bindd = $mod,          Q,          Close Focused Window,            exec,            $CLOSE_WINDOW   #"Close Focused Window"
bindd = ALT,           F4,         Close Focused Window,            exec,            $CLOSE_WINDOW   #"Close Focused Window"
bindd = $mod,          D,          Toggle Floating,                 togglefloating                   #"Toggle Floating"
bindd = $mod,          G,          Toggle Group,                    togglegroup                      #"Toggle Group"
bindd = SHIFT,         F11,        Toggle Fullscreen,               fullscreen                       #"Toggle Fullscreen"
bindd = $mod,          RETURN,     Fullscreen,                      fullscreen,      1               #"Fullscreen"
bindd = $mod SHIFT,    RETURN,     Fullscreen (No Bar),             fullscreen,      0               #"Fullscreen (No Bar)"
bindd = $mod SHIFT,    C,          Center Window,                   centerwindow,    1               #"Center Window"
bindd = $mod SHIFT,    M,          Maximize Window,                 resizeactive,    exact 95% 95%   #"Maximize Window"
bindd = $mod SHIFT,    M,          Maximize Window (Center),        centerwindow,    1               #"Maximize Window (Center)"
bindd = $mod SHIFT,    N,          3/4 Window,                      resizeactive,    exact 65% 85%   #"3/4 Window"
bindd = $mod SHIFT,    N,          3/4 Window (Center),             centerwindow,    1               #"3/4 Window (Center)"
bindd = $mod SHIFT,    B,          Half Window,                     resizeactive,    exact 50% 75%   #"Half Window"
bindd = $mod SHIFT,    B,          Half Window (Center),            centerwindow,    1               #"Half Window (Center)"

bindd = $mod CTRL,     H,          Change Active Group Backwards,   changegroupactive, b             #"Change Active Group Backwards"
bindd = $mod CTRL,     L,          Change Active Group Forwards,    changegroupactive, f             #"Change Active Group Forwards"

bindd = $mod,          LEFT,       Focus Left,                      movefocus,       l               #"Focus Left"
bindd = $mod,          RIGHT,      Focus Right,                     movefocus,       r               #"Focus Right"
bindd = $mod,          UP,         Focus Up,                        movefocus,       u               #"Focus Up"
bindd = $mod,          DOWN,       Focus Down,                      movefocus,       d               #"Focus Down"
bindd = ALT,           TAB,        Cycle Focus,                     cyclenext                        #"Cycle Focus"
bindd = ALT SHIFT,     TAB,        Cycle Focus,                     cyclenext,       prev            #"Cycle Focus (Backwards)"
bindd = $mod,          H,          Focus Left,                      movefocus,       l               #"Focus Left (Vim)"
bindd = $mod,          L,          Focus Right,                     movefocus,       r               #"Focus Right (Vim)"
bindd = $mod,          K,          Focus Up,                        movefocus,       u               #"Focus Up (Vim)"
bindd = $mod,          J,          Focus Down,                      movefocus,       d               #"Focus Down (Vim)"

bindd = $mod SHIFT,    H,          Move Window Left,                movewindow,      l               #"Move Window Left (Vim)"
bindd = $mod SHIFT,    L,          Move Window Right,               movewindow,      r               #"Move Window Right (Vim)"
bindd = $mod SHIFT,    K,          Move Window Up,                  movewindow,      u               #"Move Window Up (Vim)"
bindd = $mod SHIFT,    J,          Move Window Down,                movewindow,      d               #"Move Window Down (Vim)"

bindde = $mod SHIFT,   RIGHT,      Resize Window Right,             resizeactive,    30 0            #"Resize Window Right"
bindde = $mod SHIFT,   LEFT,       Resize Window Left,              resizeactive,    -30 0           #"Resize Window Left"
bindde = $mod SHIFT,   UP,         Resize Window Up,                resizeactive,    0 -30           #"Resize Window Up"
bindde = $mod SHIFT,   DOWN,       Resize Window Down,              resizeactive,    0 30            #"Resize Window Down"
bindde = $mod CTRL,    H,          Resize Window Left,              resizeactive,    -30 0           #"Resize Window Left (Vim)"
bindde = $mod CTRL,    L,          Resize Window Right,             resizeactive,    30 0            #"Resize Window Right (Vim)"
bindde = $mod CTRL,    K,          Resize Window Up,                resizeactive,    0 -30           #"Resize Window Up (Vim)"
bindde = $mod CTRL,    J,          Resize Window Down,              resizeactive,    0 30            #"Resize Window Down (Vim)"

$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive

bindde = $mod CTRL SHIFT,   LEFT,   Move Active Window Left,         exec,            $moveactivewindow -30 0 || hyprctl dispatch movewindow l  #"Move Active Window Left"
bindde = $mod CTRL SHIFT,   RIGHT,  Move Active Window Right,        exec,            $moveactivewindow 30 0 || hyprctl dispatch movewindow r   #"Move Active Window Right"
bindde = $mod CTRL SHIFT,   UP,     Move Active Window Up,           exec,            $moveactivewindow 0 -30 || hyprctl dispatch movewindow u  #"Move Active Window Up"
bindde = $mod CTRL SHIFT,   DOWN,   Move Active Window Down,         exec,            $moveactivewindow 0 30 || hyprctl dispatch movewindow d   #"Move Active Window Down"

binddm = $mod,        mouse:272,  Hold To Move Window,             movewindow                                              #"Hold To Move Window"
binddm = $mod,        mouse:273,  Hold To Resize Window,           resizewindow                                            #"Hold To Resize Window"
binddm = $mod,        Z,          Hold To Move Window,             movewindow                                              #"Hold To Move Window (Key)"
binddm = $mod SHIFT,  Z,          Hold To Resize Window,           resizewindow                                            #"Hold To Resize Window (Key)"
binddm = ,            F20,        Hold To Move Window,             movewindow                                              #"Hold To Move Window (Key)"
binddm = SHIFT,       F20,        Hold To Resize Window,           resizewindow                                            #"Hold To Resize Window (Key)"

bindd = $mod ALT,      BACKSLASH,  Toggle Split,                    togglesplit                                             #"Toggle Split"
bindd = $mod,          P,          Toggle Pseudo,                   pseudo                                                  #"Toggle Pseudo"

bindd = $mod,          U,          Toggle Opacity,                  setprop,         active opaque toggle                   #"Toggle Opacity"
bindd = $mod ALT,      U,          Toggle Blur,                     setprop,         active no_blur toggle                  #"Toggle Blur"


# 2. Launcher
bindd = $mod,          T,          Terminal (No Tmux),              exec,            $TERMINAL                              #"Terminal (No Tmux)"
bindd = $mod CTRL,     T,          Alt Terminal,                    exec,            $ALT_TERMINAL                          #"Alt Terminal"
bindd = $mod,          E,          File Explorer,                   exec,            $EXPLORER                              #"File Explorer"
bindd = $mod,          Y,          File Explorer (Yazi),            exec,            $YAZI                                  #"File Explorer (Yazi)"
bindd = $mod,          B,          Browser,                         exec,            $BROWSER                               #"Browser"
bindd = $mod CTRL,     B,          Alt Browser,                     exec,            $ALT_BROWSER                           #"Alt Browser"
bindd = ALT,           SPACE,      Application Finder,              exec,            $MENU                                  #"Application Finder"
bindd = CTRL SHIFT,    ESCAPE,     Btop Process Monitor,            exec,            $BTOP                                  #"Btop Process Monitor"


# 3. Workspaces
bindd = $mod,                1,              Navigate To Workspace 1,         workspace,       1                            #"Navigate To Workspace 1"
bindd = $mod,                2,              Navigate To Workspace 2,         workspace,       2                            #"Navigate To Workspace 2"
bindd = $mod,                3,              Navigate To Workspace 3,         workspace,       3                            #"Navigate To Workspace 3"
bindd = $mod,                4,              Navigate To Workspace 4,         workspace,       4                            #"Navigate To Workspace 4"
bindd = $mod,                5,              Navigate To Workspace 5,         workspace,       5                            #"Navigate To Workspace 5"
bindd = $mod,                6,              Navigate To Workspace 6,         workspace,       6                            #"Navigate To Workspace 6"
bindd = $mod,                7,              Navigate To Workspace 7,         workspace,       7                            #"Navigate To Workspace 7"
bindd = $mod,                8,              Navigate To Workspace 8,         workspace,       8                            #"Navigate To Workspace 8"
bindd = $mod,                9,              Navigate To Workspace 9,         workspace,       9                            #"Navigate To Workspace 9"
bindd = $mod,                0,              Navigate To Workspace 10,        workspace,       10                           #"Navigate To Workspace 10"
bindd = $mod CTRL,           RIGHT,          Next Workspace,                  exec,            $WORKSPACE_CLAMP next        #"Next Workspace"
bindd = $mod CTRL,           LEFT,           Previous Workspace,              exec,            $WORKSPACE_CLAMP prev        #"Previous Workspace"
bindd = $mod CTRL,           DOWN,           Nearest Empty Workspace,         workspace,       empty                        #"Nearest Empty Workspace"
bindd = $mod,                mouse_down,     Next Workspace,                  exec,            $WORKSPACE_CLAMP next        #"Next Workspace (Mouse)"
bindd = $mod,                mouse_up,       Previous Workspace,              exec,            $WORKSPACE_CLAMP prev        #"Previous Workspace (Mouse)"
bindd = $mod,                PERIOD,         Next Workspace,                  exec,            $WORKSPACE_CLAMP next        #"Next Workspace (Key)"
bindd = $mod,                COMMA,          Previous Workspace,              exec,            $WORKSPACE_CLAMP prev        #"Previous Workspace (Key)"
bindd = $mod,                TAB,            Next Workspace,                  workspace,       m+1                          #"Next Workspace (Tab)"
bindd = $mod SHIFT,          TAB,            Previous Workspace,              workspace,       m-1                          #"Previous Workspace (Tab)"
bindd = $mod CTRL,           BRACKETRIGHT,   Next Workspace,                  exec,            $WORKSPACE_CLAMP next        #"Next Workspace (Bracket)"
bindd = $mod CTRL,           BRACKETLEFT,    Previous Workspace,              exec,            $WORKSPACE_CLAMP prev        #"Previous Workspace (Bracket)"

bindd = $mod SHIFT,          1,              Move To Workspace 1,             movetoworkspace, 1                            #"Move To Workspace 1"
bindd = $mod SHIFT,          2,              Move To Workspace 2,             movetoworkspace, 2                            #"Move To Workspace 2"
bindd = $mod SHIFT,          3,              Move To Workspace 3,             movetoworkspace, 3                            #"Move To Workspace 3"
bindd = $mod SHIFT,          4,              Move To Workspace 4,             movetoworkspace, 4                            #"Move To Workspace 4"
bindd = $mod SHIFT,          5,              Move To Workspace 5,             movetoworkspace, 5                            #"Move To Workspace 5"
bindd = $mod SHIFT,          6,              Move To Workspace 6,             movetoworkspace, 6                            #"Move To Workspace 6"
bindd = $mod SHIFT,          7,              Move To Workspace 7,             movetoworkspace, 7                            #"Move To Workspace 7"
bindd = $mod SHIFT,          8,              Move To Workspace 8,             movetoworkspace, 8                            #"Move To Workspace 8"
bindd = $mod SHIFT,          9,              Move To Workspace 9,             movetoworkspace, 9                            #"Move To Workspace 9"
bindd = $mod SHIFT,          0,              Move To Workspace 10,            movetoworkspace, 10                           #"Move To Workspace 10"
bindd = $mod ALT CTRL,       RIGHT,          Move To Next Workspace,          exec,            $WORKSPACE_CLAMP next move   #"Move To Next Workspace"
bindd = $mod ALT CTRL,       LEFT,           Move To Previous Workspace,      exec,            $WORKSPACE_CLAMP prev move   #"Move To Previous Workspace"
bindd = $mod SHIFT,          PERIOD,         Move To Next Workspace,          exec,            $WORKSPACE_CLAMP next move   #"Move To Next Workspace (Key)"
bindd = $mod SHIFT,          COMMA,          Move To Previous Workspace,      exec,            $WORKSPACE_CLAMP prev move   #"Move To Previous Workspace (Key)"
bindd = $mod CTRL SHIFT,     BRACKETRIGHT,   Move To Next Workspace,          exec,            $WORKSPACE_CLAMP next move   #"Move To Next Workspace (Bracket)"
bindd = $mod CTRL SHIFT,     BRACKETLEFT,    Move To Previous Workspace,      exec,            $WORKSPACE_CLAMP prev move   #"Move To Previous Workspace (Bracket)"

bindd = $mod ALT,            1,              Move To Workspace 1 (Silent),          movetoworkspacesilent, 1                                 #"Move To Workspace 1 (Silent)"
bindd = $mod ALT,            2,              Move To Workspace 2 (Silent),          movetoworkspacesilent, 2                                 #"Move To Workspace 2 (Silent)"
bindd = $mod ALT,            3,              Move To Workspace 3 (Silent),          movetoworkspacesilent, 3                                 #"Move To Workspace 3 (Silent)"
bindd = $mod ALT,            4,              Move To Workspace 4 (Silent),          movetoworkspacesilent, 4                                 #"Move To Workspace 4 (Silent)"
bindd = $mod ALT,            5,              Move To Workspace 5 (Silent),          movetoworkspacesilent, 5                                 #"Move To Workspace 5 (Silent)"
bindd = $mod ALT,            6,              Move To Workspace 6 (Silent),          movetoworkspacesilent, 6                                 #"Move To Workspace 6 (Silent)"
bindd = $mod ALT,            7,              Move To Workspace 7 (Silent),          movetoworkspacesilent, 7                                 #"Move To Workspace 7 (Silent)"
bindd = $mod ALT,            8,              Move To Workspace 8 (Silent),          movetoworkspacesilent, 8                                 #"Move To Workspace 8 (Silent)"
bindd = $mod ALT,            9,              Move To Workspace 9 (Silent),          movetoworkspacesilent, 9                                 #"Move To Workspace 9 (Silent)"
bindd = $mod ALT,            0,              Move To Workspace 10 (Silent),         movetoworkspacesilent, 10                                #"Move To Workspace 10 (Silent)"
bindd = $mod ALT,            PERIOD,         Move To Next Workspace (Silent),       exec,                  $WORKSPACE_CLAMP next movesilent  #"Move To Next Workspace (Silent)"
bindd = $mod ALT,            COMMA,          Move To Previous Workspace (Silent),   exec,                  $WORKSPACE_CLAMP prev movesilent  #"Move To Previous Workspace (Silent)"
bindd = $mod ALT CTRL,       BRACKETRIGHT,   Move To Next Workspace (Silent),       exec,                  $WORKSPACE_CLAMP next movesilent  #"Move To Next Workspace (Silent) (Bracket)"
bindd = $mod ALT CTRL,       BRACKETLEFT,    Move To Previous Workspace (Silent),   exec,                  $WORKSPACE_CLAMP prev movesilent  #"Move To Previous Workspace (Silent) (Bracket)"

bindd = $mod SHIFT,          S,              Move To Scratchpad,                    movetoworkspace,          special            #"Move To Scratchpad"
bindd = $mod ALT,            S,              Move To Scratchpad (Silent),           movetoworkspacesilent,    special            #"Move To Scratchpad (Silent)"
bindd = $mod,                S,              Toggle Scratchpad,                     togglespecialworkspace                       #"Toggle Scratchpad"

bindd = $mod,                X,              Send to minimized workspace,           movetoworkspacesilent,    special:minimized  #"Send to minimized workspace"
bindd = $mod SHIFT,          X,              Toggle minimized workspace,            togglespecialworkspace,   minimized          #"Toggle minimized workspace"
bindd = $mod CTRL,           X,              Move from minimized workspace,         movetoworkspace,          +0                 #"Move from minimized workspace"


# 4. Monitor / Display Navigation
bindd = $mod,          I,    Focus Left Monitor,                      focusmonitor,   l                      #"Focus Left Monitor"
bindd = $mod,          O,    Focus Right Monitor,                     focusmonitor,   r                      #"Focus Right Monitor"

bindd = $mod SHIFT,    I,    Move Window To Left Monitor,             movewindow,     mon:l                  #"Move Window To Left Monitor"
bindd = $mod SHIFT,    O,    Move Window To Right Monitor,            movewindow,     mon:r                  #"Move Window To Right Monitor"

bindd = $mod ALT,      I,    Move Window To Left Monitor (Silent),    movewindow,     mon:l silent           #"Move Window To Left Monitor (Silent)"
bindd = $mod ALT,      O,    Move Window To Right Monitor (Silent),   movewindow,     mon:r silent           #"Move Window To Right Monitor (Silent)"


# 5. Audio Controls
bindel = ,                XF86AudioRaiseVolume,  exec,    pamixer -i 2                  #"Raise Volume"
bindel = ,                XF86AudioLowerVolume,  exec,    pamixer -d 2                  #"Lower Volume"
bindl = ,                 XF86AudioMute,         exec,    pamixer -t                    #"Mute Volume"
bindl = ,                 XF86AudioMicMute,      exec,    pamixer --default-source -m   #"Mute Microphone"
bindl = ,                 XF86AudioPlay,         exec,    playerctl play-pause          #"Play"
bindl = ,                 XF86AudioPause,        exec,    playerctl play-pause          #"Pause"
bindl = ,                 XF86AudioNext,         exec,    playerctl next                #"Next Track"
bindl = ,                 XF86AudioPrev,         exec,    playerctl previous            #"Previous Track"


# 6. Screenshot Controls
bindd = ,                 Print,      Screenshot Region,           exec,    $SCREENSHOT region            #"Screenshot Region" 
bindd = SHIFT,            Print,      Screenshot Window,           exec,    $SCREENSHOT window            #"Screenshot Window" 
bindd = CTRL,             Print,      Screenshot Screen,           exec,    $SCREENSHOT screen            #"Screenshot Screen" 
bindd = $mod,             Print,      Screenshot All Monitors,     exec,    $SCREENSHOT full              #"Screenshot All" 


# 6. Misc
bindd = $mod ALT CTRL,  BACKSPACE,    Quit Hyprland,     exit     #"Quit Hyprland"
