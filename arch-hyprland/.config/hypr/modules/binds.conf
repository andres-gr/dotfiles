## ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ
## ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚ĖĄ‚Ėą

# see https://wiki.hyprland.org/configuring/keywords/ for more
# example binds, see https://wiki.hyprland.org/configuring/binds/ for more

#? ------- KEYBINDS_HYPRLAND_V_0_53 COMPATIBLE ----------------
#   This Config is compatible with keybinding changes in Hyprland v0.53+

#? ------- Grouping of binds for easier management ----------------
#  $d=[Group Name|Subgroup Name1|Subgroup Name2|...]

#? ------- Variables ----------------
$ALT_BROWSER    = chromium
$ALT_TERMINAL   = kitty
$BROWSER        = zen-browser
$EXPLORER       = dolphin
$MENU           = fuzzel
$TERMINAL       = ghostty

#? ------- Modifiers ----------------
$mainMod              = SUPER
$altMod               = ALT
$ctrlMod              = CTRL
$shiftMod             = SHIFT
$mainAltCtrlMod       = SUPER ALT CTRL
$mainAltCtrlShiftMod  = SUPER ALT CTRL SHIFT
$mainAltMod           = SUPER ALT
$mainAltShiftMod      = SUPER ALT SHIFT
$mainCtrlMod          = SUPER CTRL
$mainCtrlShiftMod     = SUPER CTRL SHIFT
$mainShiftMod         = SUPER SHIFT
$altCtrlMod           = ALT CTRL
$altShiftCtrlMod      = ALT SHIFT CTRL
$altShiftMod          = ALT SHIFT
$ctrlShiftMod         = CTRL SHIFT

#? ------- Scripts ------------------
$BASE_PATH = $HOME/.local/bin
$WORKSPACE_CLAMP = $BASE_PATH/hypr-workspace-clamp

# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
# Window Management
# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ

$wm=Window Management
$d=[$wm]

bindd = $mainShiftMod,    Q,          Kill Focused Window,             forcekillactive
bindd = $mainMod,         W,          Close Focused Window,            killactive
# bindd = ALT,              F4,         Close Focused Window,            exec,            hyde-shell dontkillsteam
bindd = $mainMod,         D,          Toggle Floating,                 togglefloating
bindd = $mainMod,         G,          Toggle Group,                    togglegroup
bindd = $shiftMod,        F11,        Toggle Fullscreen,               fullscreen
bindd = $mainMod,         RETURN,     Fullscreen,                      fullscreen,      1
bindd = $mainShiftMod,    RETURN,     Fullscreen (No Bar),             fullscreen,      0
bindd = $mainShiftMod,    C,          Center Window,                   centerwindow,    1
bindd = $mainShiftMod,    M,          Maximize Window,                 resizeactive,    exact 95% 95%
bindd = $mainShiftMod,    M,          Maximize Window (Center),        centerwindow,    1
bindd = $mainShiftMod,    N,          3/4 Window,                      resizeactive,    exact 65% 85%
bindd = $mainShiftMod,    N,          3/4 Window (Center),             centerwindow,    1
bindd = $mainShiftMod,    B,          Half Window,                     resizeactive,    exact 50% 75%
bindd = $mainShiftMod,    B,          Half Window (Center),            centerwindow,    1


$d=[$wm|Group Navigation]

bindd = $mainCtrlMod,     H,          Change Active Group Backwards,   changegroupactive, b
bindd = $mainCtrlMod,     L,          Change Active Group Forwards,    changegroupactive, f


$d=[$wm|Change Focus]

bindd = $mainMod,         LEFT,       Focus Left,                      movefocus,       l
bindd = $mainMod,         RIGHT,      Focus Right,                     movefocus,       r
bindd = $mainMod,         UP,         Focus Up,                        movefocus,       u
bindd = $mainMod,         DOWN,       Focus Down,                      movefocus,       d
bindd = $altMod,          TAB,        Cycle Focus,                     cyclenext
bindd = $altShiftMod,     TAB,        Cycle Focus,                     cyclenext,       prev
bindd = $mainMod,         H,          Focus Left,                      movefocus,       l
bindd = $mainMod,         L,          Focus Right,                     movefocus,       r
bindd = $mainMod,         K,          Focus Up,                        movefocus,       u
bindd = $mainMod,         J,          Focus Down,                      movefocus,       d


$d=[$wm|Move Window]

bindd = $mainShiftMod,    H,          Move Window Left,                movewindow,      l
bindd = $mainShiftMod,    L,          Move Window Right,               movewindow,      r
bindd = $mainShiftMod,    K,          Move Window Up,                  movewindow,      u
bindd = $mainShiftMod,    J,          Move Window Down,                movewindow,      d


$d=[$wm|Resize Active Window]

bindde = $mainShiftMod,   RIGHT,      Resize Window Right,             resizeactive,    30 0
bindde = $mainShiftMod,   LEFT,       Resize Window Left,              resizeactive,    -30 0
bindde = $mainShiftMod,   UP,         Resize Window Up,                resizeactive,    0 -30
bindde = $mainShiftMod,   DOWN,       Resize Window Down,              resizeactive,    0 30
bindde = $mainCtrlMod,    H,          Resize Window Left,              resizeactive,    -30 0
bindde = $mainCtrlMod,    L,          Resize Window Right,             resizeactive,    30 0
bindde = $mainCtrlMod,    K,          Resize Window Up,                resizeactive,    0 -30
bindde = $mainCtrlMod,    J,          Resize Window Down,              resizeactive,    0 30


$d=[$wm|Move Active Window Across Workspace]
$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive

bindde = $mainCtrlShiftMod,   LEFT,   Move Active Window Left,         exec,            $moveactivewindow -30 0 || hyprctl dispatch movewindow l
bindde = $mainCtrlShiftMod,   RIGHT,  Move Active Window Right,        exec,            $moveactivewindow 30 0 || hyprctl dispatch movewindow r
bindde = $mainCtrlShiftMod,   UP,     Move Active Window Up,           exec,            $moveactivewindow 0 -30 || hyprctl dispatch movewindow u
bindde = $mainCtrlShiftMod,   DOWN,   Move Active Window Down,         exec,            $moveactivewindow 0 30 || hyprctl dispatch movewindow d


$d=[$wm|Move & Resize With Mouse]

binddm = $mainMod,        mouse:272,  Hold To Move Window,             movewindow
binddm = $mainMod,        mouse:273,  Hold To Resize Window,           resizewindow
binddm = $mainMod,        Z,          Hold To Move Window,             movewindow
binddm = $mainShiftMod,   Z,          Hold To Resize Window,           resizewindow


$d=[$wm|Split Layout]

bindd = $mainAltMod,      BACKSLASH,  Toggle Split,                    togglesplit
bindd = $mainMod,         P,          Toggle Pseudo,                   pseudo


$d=[$wm|Opacity & Blur]

bindd = $mainMod,         U,          Toggle Opacity,                  setprop,         active opaque toggle
bindd = $mainAltMod,      U,          Toggle Blur,                     setprop,         active no_blur toggle

# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
# Launcher
# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ

$l=Launcher
$d=[$l|Apps]

bindd = $mainMod,         T,          Terminal,                        exec,            $TERMINAL
bindd = $mainCtrlMod,     T,          Alt Terminal,                    exec,            $ALT_TERMINAL
bindd = $mainMod,         E,          File Explorer,                   exec,            $EXPLORER
bindd = $mainMod,         B,          Browser,                         exec,            $BROWSER
bindd = $mainCtrlMod,     B,          Alt Browser,                     exec,            $ALT_BROWSER
bindd = $altMod,          SPACE,      Application Finder,              exec,            $MENU

# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
# Workspaces
# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ

$ws=Workspaces
$d=[$ws|Navigation]

bindd = $mainMod,               1,              Navigate To Workspace 1,         workspace,       1
bindd = $mainMod,               2,              Navigate To Workspace 2,         workspace,       2
bindd = $mainMod,               3,              Navigate To Workspace 3,         workspace,       3
bindd = $mainMod,               4,              Navigate To Workspace 4,         workspace,       4
bindd = $mainMod,               5,              Navigate To Workspace 5,         workspace,       5
bindd = $mainMod,               6,              Navigate To Workspace 6,         workspace,       6
bindd = $mainMod,               7,              Navigate To Workspace 7,         workspace,       7
bindd = $mainMod,               8,              Navigate To Workspace 8,         workspace,       8
bindd = $mainMod,               9,              Navigate To Workspace 9,         workspace,       9
bindd = $mainMod,               0,              Navigate To Workspace 10,        workspace,       10
bindd = $mainCtrlMod,           RIGHT,          Next Workspace,                  exec,            $WORKSPACE_CLAMP next
bindd = $mainCtrlMod,           LEFT,           Previous Workspace,              exec,            $WORKSPACE_CLAMP prev
bindd = $mainCtrlMod,           DOWN,           Nearest Empty Workspace,         workspace,       empty
bindd = $mainMod,               mouse_down,     Next Workspace,                  exec,            $WORKSPACE_CLAMP next
bindd = $mainMod,               mouse_up,       Previous Workspace,              exec,            $WORKSPACE_CLAMP prev
bindd = $mainMod,               PERIOD,         Next Workspace,                  exec,            $WORKSPACE_CLAMP next
bindd = $mainMod,               COMMA,          Previous Workspace,              exec,            $WORKSPACE_CLAMP prev
bindd = $mainCtrlMod,           BRACKETRIGHT,   Next Workspace,                  exec,            $WORKSPACE_CLAMP next
bindd = $mainCtrlMod,           BRACKETLEFT,    Previous Workspace,              exec,            $WORKSPACE_CLAMP prev


$d=[$ws|Move Window To Workspace]

bindd = $mainShiftMod,          1,              Move To Workspace 1,             movetoworkspace, 1
bindd = $mainShiftMod,          2,              Move To Workspace 2,             movetoworkspace, 2
bindd = $mainShiftMod,          3,              Move To Workspace 3,             movetoworkspace, 3
bindd = $mainShiftMod,          4,              Move To Workspace 4,             movetoworkspace, 4
bindd = $mainShiftMod,          5,              Move To Workspace 5,             movetoworkspace, 5
bindd = $mainShiftMod,          6,              Move To Workspace 6,             movetoworkspace, 6
bindd = $mainShiftMod,          7,              Move To Workspace 7,             movetoworkspace, 7
bindd = $mainShiftMod,          8,              Move To Workspace 8,             movetoworkspace, 8
bindd = $mainShiftMod,          9,              Move To Workspace 9,             movetoworkspace, 9
bindd = $mainShiftMod,          0,              Move To Workspace 10,            movetoworkspace, 10
bindd = $mainAltCtrlMod,        RIGHT,          Move To Next Workspace,          exec,            $WORKSPACE_CLAMP next move
bindd = $mainAltCtrlMod,        LEFT,           Move To Previous Workspace,      exec,            $WORKSPACE_CLAMP prev move
bindd = $mainShiftMod,          PERIOD,         Move To Next Workspace,          exec,            $WORKSPACE_CLAMP next move
bindd = $mainShiftMod,          COMMA,          Move To Previous Workspace,      exec,            $WORKSPACE_CLAMP prev move
bindd = $mainCtrlShiftMod,      BRACKETRIGHT,   Move To Next Workspace,          exec,            $WORKSPACE_CLAMP next move
bindd = $mainCtrlShiftMod,      BRACKETLEFT,    Move To Previous Workspace,      exec,            $WORKSPACE_CLAMP prev move


$d=[$ws|Move Window To Workspace Silently]

bindd = $mainAltMod,            1,              Move To Workspace 1 (Silent),          movetoworkspacesilent, 1
bindd = $mainAltMod,            2,              Move To Workspace 2 (Silent),          movetoworkspacesilent, 2
bindd = $mainAltMod,            3,              Move To Workspace 3 (Silent),          movetoworkspacesilent, 3
bindd = $mainAltMod,            4,              Move To Workspace 4 (Silent),          movetoworkspacesilent, 4
bindd = $mainAltMod,            5,              Move To Workspace 5 (Silent),          movetoworkspacesilent, 5
bindd = $mainAltMod,            6,              Move To Workspace 6 (Silent),          movetoworkspacesilent, 6
bindd = $mainAltMod,            7,              Move To Workspace 7 (Silent),          movetoworkspacesilent, 7
bindd = $mainAltMod,            8,              Move To Workspace 8 (Silent),          movetoworkspacesilent, 8
bindd = $mainAltMod,            9,              Move To Workspace 9 (Silent),          movetoworkspacesilent, 9
bindd = $mainAltMod,            0,              Move To Workspace 10 (Silent),         movetoworkspacesilent, 10
bindd = $mainAltMod,            PERIOD,         Move To Next Workspace (Silent),       exec,                  $WORKSPACE_CLAMP next movesilent
bindd = $mainAltMod,            COMMA,          Move To Previous Workspace (Silent),   exec,                  $WORKSPACE_CLAMP prev movesilent
bindd = $mainAltCtrlMod,        BRACKETRIGHT,   Move To Next Workspace (Silent),       exec,                  $WORKSPACE_CLAMP next movesilent
bindd = $mainAltCtrlMod,        BRACKETLEFT,    Move To Previous Workspace (Silent),   exec,                  $WORKSPACE_CLAMP prev movesilent


$d=[$ws|Special Workspace]

bindd = $mainShiftMod,          S,              Move To Scratchpad,                    movetoworkspace,          special
bindd = $mainAltMod,            S,              Move To Scratchpad (Silent),           movetoworkspacesilent,    special
bindd = $mainMod,               S,              Toggle Scratchpad,                     togglespecialworkspace


$d=[$ws|Special Minimized Workspace]

bindd = $mainMod,               X,              Send to minimized workspace,           movetoworkspacesilent,    special:minimized
bindd = $mainShiftMod,          X,              Toggle minimized workspace,            togglespecialworkspace,   minimized
bindd = $mainCtrlMod,           X,              Move from minimized workspace,         movetoworkspace,          +0

# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
# Monitor / Display Navigation
# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ

$wm=Window Management
$d=[$wm|Monitors]

bindd = $mainMod,         I,    Focus Left Monitor,                      focusmonitor,   l
bindd = $mainMod,         O,    Focus Right Monitor,                     focusmonitor,   r

bindd = $mainShiftMod,    I,    Move Window To Left Monitor,             movewindow,     mon:l
bindd = $mainShiftMod,    O,    Move Window To Right Monitor,            movewindow,     mon:r

bindd = $mainAltMod,      I,    Move Window To Left Monitor (Silent),    movewindow,     mon:l silent
bindd = $mainAltMod,      O,    Move Window To Right Monitor (Silent),   movewindow,     mon:r silent

# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ
# Misc
# ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ‚ĒÄ

$wm=Misc
$d=[$wm|Exit]

bindd = $mainAltCtrlMod,  BACKSPACE,    Quit Hyprland,     exit

$d=#! unset the group name
