## ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ
## ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚ĖĄ‚Ėą

# see https://wiki.hyprland.org/configuring/keywords/ for more
# example binds, see https://wiki.hyprland.org/configuring/binds/ for more

#? ------- KEYBINDS_HYPRLAND_V_0_53 COMPATIBLE ----------------
#   This Config is compatible with keybinding changes in Hyprland v0.53+

#? ------- Variables ----------------
$ALT_BROWSER    = chromium
$ALT_TERMINAL   = kitty
$BROWSER        = zen-browser
$EXPLORER       = dolphin
$MENU           = fuzzel
$TERMINAL       = ghostty

#? ------- Modifiers ----------------
$mainMod              = SUPER
$altMod               = ALT
$ctrlMod              = CTRL
$shiftMod             = SHIFT
$mainAltCtrlMod       = SUPER ALT CTRL
$mainAltCtrlShiftMod  = SUPER ALT CTRL SHIFT
$mainAltMod           = SUPER ALT
$mainAltShiftMod      = SUPER ALT SHIFT
$mainCtrlMod          = SUPER CTRL
$mainCtrlShiftMod     = SUPER CTRL SHIFT
$mainShiftMod         = SUPER SHIFT
$altCtrlMod           = ALT CTRL
$altShiftCtrlMod      = ALT SHIFT CTRL
$altShiftMod          = ALT SHIFT
$ctrlShiftMod         = CTRL SHIFT

#? ------- Scripts ------------------
$BASE_PATH = $HOME/.local/bin
$WORKSPACE_CLAMP = $BASE_PATH/hypr-workspace-clamp
$CLOSE_WINDOW = $BASE_PATH/dont-kill-steam


# 1. WINDOW MANAGEMENT
bindd = $mainShiftMod,    Q,          Kill Focused Window,             forcekillactive                  #"Kill Focused Window"
bindd = $mainMod,         Q,          Close Focused Window,            exec,            $CLOSE_WINDOW   #"Close Focused Window"
bindd = $altMod,          F4,         Close Focused Window,            exec,            $CLOSE_WINDOW   #"Close Focused Window"
bindd = $mainMod,         D,          Toggle Floating,                 togglefloating                   #"Toggle Floating"
bindd = $mainMod,         G,          Toggle Group,                    togglegroup                      #"Toggle Group"
bindd = $shiftMod,        F11,        Toggle Fullscreen,               fullscreen                       #"Toggle Fullscreen"
bindd = $mainMod,         RETURN,     Fullscreen,                      fullscreen,      1               #"Fullscreen"
bindd = $mainShiftMod,    RETURN,     Fullscreen (No Bar),             fullscreen,      0               #"Fullscreen (No Bar)"
bindd = $mainShiftMod,    C,          Center Window,                   centerwindow,    1               #"Center Window"
bindd = $mainShiftMod,    M,          Maximize Window,                 resizeactive,    exact 95% 95%   #"Maximize Window"
bindd = $mainShiftMod,    M,          Maximize Window (Center),        centerwindow,    1               #"Maximize Window (Center)"
bindd = $mainShiftMod,    N,          3/4 Window,                      resizeactive,    exact 65% 85%   #"3/4 Window"
bindd = $mainShiftMod,    N,          3/4 Window (Center),             centerwindow,    1               #"3/4 Window (Center)"
bindd = $mainShiftMod,    B,          Half Window,                     resizeactive,    exact 50% 75%   #"Half Window"
bindd = $mainShiftMod,    B,          Half Window (Center),            centerwindow,    1               #"Half Window (Center)"

bindd = $mainCtrlMod,     H,          Change Active Group Backwards,   changegroupactive, b             #"Change Active Group Backwards"
bindd = $mainCtrlMod,     L,          Change Active Group Forwards,    changegroupactive, f             #"Change Active Group Forwards"

bindd = $mainMod,         LEFT,       Focus Left,                      movefocus,       l               #"Focus Left"
bindd = $mainMod,         RIGHT,      Focus Right,                     movefocus,       r               #"Focus Right"
bindd = $mainMod,         UP,         Focus Up,                        movefocus,       u               #"Focus Up"
bindd = $mainMod,         DOWN,       Focus Down,                      movefocus,       d               #"Focus Down"
bindd = $altMod,          TAB,        Cycle Focus,                     cyclenext                        #"Cycle Focus"
bindd = $altShiftMod,     TAB,        Cycle Focus,                     cyclenext,       prev            #"Cycle Focus (Backwards)"
bindd = $mainMod,         H,          Focus Left,                      movefocus,       l               #"Focus Left (Vim)"
bindd = $mainMod,         L,          Focus Right,                     movefocus,       r               #"Focus Right (Vim)"
bindd = $mainMod,         K,          Focus Up,                        movefocus,       u               #"Focus Up (Vim)"
bindd = $mainMod,         J,          Focus Down,                      movefocus,       d               #"Focus Down (Vim)"

bindd = $mainShiftMod,    H,          Move Window Left,                movewindow,      l               #"Move Window Left (Vim)"
bindd = $mainShiftMod,    L,          Move Window Right,               movewindow,      r               #"Move Window Right (Vim)"
bindd = $mainShiftMod,    K,          Move Window Up,                  movewindow,      u               #"Move Window Up (Vim)"
bindd = $mainShiftMod,    J,          Move Window Down,                movewindow,      d               #"Move Window Down (Vim)"

bindde = $mainShiftMod,   RIGHT,      Resize Window Right,             resizeactive,    30 0            #"Resize Window Right"
bindde = $mainShiftMod,   LEFT,       Resize Window Left,              resizeactive,    -30 0           #"Resize Window Left"
bindde = $mainShiftMod,   UP,         Resize Window Up,                resizeactive,    0 -30           #"Resize Window Up"
bindde = $mainShiftMod,   DOWN,       Resize Window Down,              resizeactive,    0 30            #"Resize Window Down"
bindde = $mainCtrlMod,    H,          Resize Window Left,              resizeactive,    -30 0           #"Resize Window Left (Vim)"
bindde = $mainCtrlMod,    L,          Resize Window Right,             resizeactive,    30 0            #"Resize Window Right (Vim)"
bindde = $mainCtrlMod,    K,          Resize Window Up,                resizeactive,    0 -30           #"Resize Window Up (Vim)"
bindde = $mainCtrlMod,    J,          Resize Window Down,              resizeactive,    0 30            #"Resize Window Down (Vim)"

$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive

bindde = $mainCtrlShiftMod,   LEFT,   Move Active Window Left,         exec,            $moveactivewindow -30 0 || hyprctl dispatch movewindow l  #"Move Active Window Left"
bindde = $mainCtrlShiftMod,   RIGHT,  Move Active Window Right,        exec,            $moveactivewindow 30 0 || hyprctl dispatch movewindow r   #"Move Active Window Right"
bindde = $mainCtrlShiftMod,   UP,     Move Active Window Up,           exec,            $moveactivewindow 0 -30 || hyprctl dispatch movewindow u  #"Move Active Window Up"
bindde = $mainCtrlShiftMod,   DOWN,   Move Active Window Down,         exec,            $moveactivewindow 0 30 || hyprctl dispatch movewindow d   #"Move Active Window Down"

binddm = $mainMod,        mouse:272,  Hold To Move Window,             movewindow                                              #"Hold To Move Window"
binddm = $mainMod,        mouse:273,  Hold To Resize Window,           resizewindow                                            #"Hold To Resize Window"
binddm = $mainMod,        Z,          Hold To Move Window,             movewindow                                              #"Hold To Move Window (Key)"
binddm = $mainShiftMod,   Z,          Hold To Resize Window,           resizewindow                                            #"Hold To Resize Window (Key)"

bindd = $mainAltMod,      BACKSLASH,  Toggle Split,                    togglesplit                                             #"Toggle Split"
bindd = $mainMod,         P,          Toggle Pseudo,                   pseudo                                                  #"Toggle Pseudo"

bindd = $mainMod,         U,          Toggle Opacity,                  setprop,         active opaque toggle                   #"Toggle Opacity"
bindd = $mainAltMod,      U,          Toggle Blur,                     setprop,         active no_blur toggle                  #"Toggle Blur"


# 2. LAUNCHER
bindd = $mainMod,         T,          Terminal,                        exec,            $TERMINAL                              #"Terminal"
bindd = $mainCtrlMod,     T,          Alt Terminal,                    exec,            $ALT_TERMINAL                          #"Alt Terminal"
bindd = $mainMod,         E,          File Explorer,                   exec,            $EXPLORER                              #"File Explorer"
bindd = $mainMod,         B,          Browser,                         exec,            $BROWSER                               #"Browser"
bindd = $mainCtrlMod,     B,          Alt Browser,                     exec,            $ALT_BROWSER                           #"Alt Browser"
bindd = $altMod,          SPACE,      Application Finder,              exec,            $MENU                                  #"Application Finder"


# 3. WORKSPACES
bindd = $mainMod,               1,              Navigate To Workspace 1,         workspace,       1                            #"Navigate To Workspace 1"
bindd = $mainMod,               2,              Navigate To Workspace 2,         workspace,       2                            #"Navigate To Workspace 2"
bindd = $mainMod,               3,              Navigate To Workspace 3,         workspace,       3                            #"Navigate To Workspace 3"
bindd = $mainMod,               4,              Navigate To Workspace 4,         workspace,       4                            #"Navigate To Workspace 4"
bindd = $mainMod,               5,              Navigate To Workspace 5,         workspace,       5                            #"Navigate To Workspace 5"
bindd = $mainMod,               6,              Navigate To Workspace 6,         workspace,       6                            #"Navigate To Workspace 6"
bindd = $mainMod,               7,              Navigate To Workspace 7,         workspace,       7                            #"Navigate To Workspace 7"
bindd = $mainMod,               8,              Navigate To Workspace 8,         workspace,       8                            #"Navigate To Workspace 8"
bindd = $mainMod,               9,              Navigate To Workspace 9,         workspace,       9                            #"Navigate To Workspace 9"
bindd = $mainMod,               0,              Navigate To Workspace 10,        workspace,       10                           #"Navigate To Workspace 10"
bindd = $mainCtrlMod,           RIGHT,          Next Workspace,                  exec,            $WORKSPACE_CLAMP next        #"Next Workspace"
bindd = $mainCtrlMod,           LEFT,           Previous Workspace,              exec,            $WORKSPACE_CLAMP prev        #"Previous Workspace"
bindd = $mainCtrlMod,           DOWN,           Nearest Empty Workspace,         workspace,       empty                        #"Nearest Empty Workspace"
bindd = $mainMod,               mouse_down,     Next Workspace,                  exec,            $WORKSPACE_CLAMP next        #"Next Workspace (Mouse)"
bindd = $mainMod,               mouse_up,       Previous Workspace,              exec,            $WORKSPACE_CLAMP prev        #"Previous Workspace (Mouse)"
bindd = $mainMod,               PERIOD,         Next Workspace,                  exec,            $WORKSPACE_CLAMP next        #"Next Workspace (Key)"
bindd = $mainMod,               COMMA,          Previous Workspace,              exec,            $WORKSPACE_CLAMP prev        #"Previous Workspace (Key)"
bindd = $mainMod,               TAB,            Next Workspace,                  workspace,       m+1                          #"Next Workspace (Tab)"
bindd = $mainShiftMod,          TAB,            Previous Workspace,              workspace,       m-1                          #"Previous Workspace (Tab)"
bindd = $mainCtrlMod,           BRACKETRIGHT,   Next Workspace,                  exec,            $WORKSPACE_CLAMP next        #"Next Workspace (Bracket)"
bindd = $mainCtrlMod,           BRACKETLEFT,    Previous Workspace,              exec,            $WORKSPACE_CLAMP prev        #"Previous Workspace (Bracket)"

bindd = $mainShiftMod,          1,              Move To Workspace 1,             movetoworkspace, 1                            #"Move To Workspace 1"
bindd = $mainShiftMod,          2,              Move To Workspace 2,             movetoworkspace, 2                            #"Move To Workspace 2"
bindd = $mainShiftMod,          3,              Move To Workspace 3,             movetoworkspace, 3                            #"Move To Workspace 3"
bindd = $mainShiftMod,          4,              Move To Workspace 4,             movetoworkspace, 4                            #"Move To Workspace 4"
bindd = $mainShiftMod,          5,              Move To Workspace 5,             movetoworkspace, 5                            #"Move To Workspace 5"
bindd = $mainShiftMod,          6,              Move To Workspace 6,             movetoworkspace, 6                            #"Move To Workspace 6"
bindd = $mainShiftMod,          7,              Move To Workspace 7,             movetoworkspace, 7                            #"Move To Workspace 7"
bindd = $mainShiftMod,          8,              Move To Workspace 8,             movetoworkspace, 8                            #"Move To Workspace 8"
bindd = $mainShiftMod,          9,              Move To Workspace 9,             movetoworkspace, 9                            #"Move To Workspace 9"
bindd = $mainShiftMod,          0,              Move To Workspace 10,            movetoworkspace, 10                           #"Move To Workspace 10"
bindd = $mainAltCtrlMod,        RIGHT,          Move To Next Workspace,          exec,            $WORKSPACE_CLAMP next move   #"Move To Next Workspace"
bindd = $mainAltCtrlMod,        LEFT,           Move To Previous Workspace,      exec,            $WORKSPACE_CLAMP prev move   #"Move To Previous Workspace"
bindd = $mainShiftMod,          PERIOD,         Move To Next Workspace,          exec,            $WORKSPACE_CLAMP next move   #"Move To Next Workspace (Key)"
bindd = $mainShiftMod,          COMMA,          Move To Previous Workspace,      exec,            $WORKSPACE_CLAMP prev move   #"Move To Previous Workspace (Key)"
bindd = $mainCtrlShiftMod,      BRACKETRIGHT,   Move To Next Workspace,          exec,            $WORKSPACE_CLAMP next move   #"Move To Next Workspace (Bracket)"
bindd = $mainCtrlShiftMod,      BRACKETLEFT,    Move To Previous Workspace,      exec,            $WORKSPACE_CLAMP prev move   #"Move To Previous Workspace (Bracket)"

bindd = $mainAltMod,            1,              Move To Workspace 1 (Silent),          movetoworkspacesilent, 1                                 #"Move To Workspace 1 (Silent)"
bindd = $mainAltMod,            2,              Move To Workspace 2 (Silent),          movetoworkspacesilent, 2                                 #"Move To Workspace 2 (Silent)"
bindd = $mainAltMod,            3,              Move To Workspace 3 (Silent),          movetoworkspacesilent, 3                                 #"Move To Workspace 3 (Silent)"
bindd = $mainAltMod,            4,              Move To Workspace 4 (Silent),          movetoworkspacesilent, 4                                 #"Move To Workspace 4 (Silent)"
bindd = $mainAltMod,            5,              Move To Workspace 5 (Silent),          movetoworkspacesilent, 5                                 #"Move To Workspace 5 (Silent)"
bindd = $mainAltMod,            6,              Move To Workspace 6 (Silent),          movetoworkspacesilent, 6                                 #"Move To Workspace 6 (Silent)"
bindd = $mainAltMod,            7,              Move To Workspace 7 (Silent),          movetoworkspacesilent, 7                                 #"Move To Workspace 7 (Silent)"
bindd = $mainAltMod,            8,              Move To Workspace 8 (Silent),          movetoworkspacesilent, 8                                 #"Move To Workspace 8 (Silent)"
bindd = $mainAltMod,            9,              Move To Workspace 9 (Silent),          movetoworkspacesilent, 9                                 #"Move To Workspace 9 (Silent)"
bindd = $mainAltMod,            0,              Move To Workspace 10 (Silent),         movetoworkspacesilent, 10                                #"Move To Workspace 10 (Silent)"
bindd = $mainAltMod,            PERIOD,         Move To Next Workspace (Silent),       exec,                  $WORKSPACE_CLAMP next movesilent  #"Move To Next Workspace (Silent)"
bindd = $mainAltMod,            COMMA,          Move To Previous Workspace (Silent),   exec,                  $WORKSPACE_CLAMP prev movesilent  #"Move To Previous Workspace (Silent)"
bindd = $mainAltCtrlMod,        BRACKETRIGHT,   Move To Next Workspace (Silent),       exec,                  $WORKSPACE_CLAMP next movesilent  #"Move To Next Workspace (Silent) (Bracket)"
bindd = $mainAltCtrlMod,        BRACKETLEFT,    Move To Previous Workspace (Silent),   exec,                  $WORKSPACE_CLAMP prev movesilent  #"Move To Previous Workspace (Silent) (Bracket)"

bindd = $mainShiftMod,          S,              Move To Scratchpad,                    movetoworkspace,          special            #"Move To Scratchpad"
bindd = $mainAltMod,            S,              Move To Scratchpad (Silent),           movetoworkspacesilent,    special            #"Move To Scratchpad (Silent)"
bindd = $mainMod,               S,              Toggle Scratchpad,                     togglespecialworkspace                       #"Toggle Scratchpad"

bindd = $mainMod,               X,              Send to minimized workspace,           movetoworkspacesilent,    special:minimized  #"Send to minimized workspace"
bindd = $mainShiftMod,          X,              Toggle minimized workspace,            togglespecialworkspace,   minimized          #"Toggle minimized workspace"
bindd = $mainCtrlMod,           X,              Move from minimized workspace,         movetoworkspace,          +0                 #"Move from minimized workspace"


# 4. MONITOR / DISPLAY NAVIGATION
bindd = $mainMod,         I,    Focus Left Monitor,                      focusmonitor,   l                      #"Focus Left Monitor"
bindd = $mainMod,         O,    Focus Right Monitor,                     focusmonitor,   r                      #"Focus Right Monitor"

bindd = $mainShiftMod,    I,    Move Window To Left Monitor,             movewindow,     mon:l                  #"Move Window To Left Monitor"
bindd = $mainShiftMod,    O,    Move Window To Right Monitor,            movewindow,     mon:r                  #"Move Window To Right Monitor"

bindd = $mainAltMod,      I,    Move Window To Left Monitor (Silent),    movewindow,     mon:l silent           #"Move Window To Left Monitor (Silent)"
bindd = $mainAltMod,      O,    Move Window To Right Monitor (Silent),   movewindow,     mon:r silent           #"Move Window To Right Monitor (Silent)"


# 5. AUDIO CONTROLS
bindel = ,                XF86AudioRaiseVolume,  exec,    pamixer -i 2                  #"Raise Volume"
bindel = ,                XF86AudioLowerVolume,  exec,    pamixer -d 2                  #"Lower Volume"
bindl = ,                 XF86AudioMute,         exec,    pamixer -t                    #"Mute Volume"
bindl = ,                 XF86AudioMicMute,      exec,    pamixer --default-source -m   #"Mute Microphone"
bindl = ,                 XF86AudioPlay,         exec,    playerctl play-pause          #"Play"
bindl = ,                 XF86AudioPause,        exec,    playerctl play-pause          #"Pause"
bindl = ,                 XF86AudioNext,         exec,    playerctl next                #"Next Track"
bindl = ,                 XF86AudioPrev,         exec,    playerctl previous            #"Previous Track"


# 6. MISC
bindd = $mainAltCtrlMod,  BACKSPACE,    Quit Hyprland,     exit     #"Quit Hyprland"
