# ── Media Players Rules ──────────────────────────────────────────────────────
windowrule {
    name = media_players
    match:class = ^(org.kde.haruna)$|^(org.nomacs.ImageLounge)$|^(.*mpv.*)$|^(.*vlc.*)$
    center = on
    float = on
    opacity = 1 override
    size = (monitor_w*0.95) (monitor_h*0.95)
}

# Inhibit idle when fullscreen for certain apps
windowrule = idle_inhibit fullscreen true,match:class ^(.*celluloid.*)$|^(.*mpv.*)$|^(.*vlc.*)$|^(org.kde.haruna)$|^(org.nomacs.ImageLounge)$
windowrule = idle_inhibit fullscreen true,match:class ^(.*[Ss]potify.*)$
windowrule = idle_inhibit fullscreen true,match:class ^(.*LibreWolf.*)$|^(.*floorp.*)$|^(.*brave-browser.*)$|^(.*firefox.*)$|^(.*chromium.*)$|^(.*zen.*)$|^(.*vivaldi.*)$

# Picture-in-Picture auto-float
windowrule {
    name = hypr_picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    tag = +hypr_picture_in_picture
    tag = +picture-in-picture
    float = true
    keep_aspect_ratio = true
    pin = true
    move = (monitor_w*0.73) (monitor_h*0.72)
    size = (monitor_w*0.25) (monitor_h*0.25)
}

# Floating for various utility applications
windowrule = float true,match:class ^(app.drey.Warp)$
windowrule = float true,match:class ^(com.github.rafostar.Clapper)$
windowrule = float true,match:class ^(com.github.unrud.VideoDownloader)$
windowrule = float true,match:class ^(eog)$
windowrule = float true,match:class ^(firefoxdeveloperedition)$,match:title ^(Library)$
windowrule = float true,match:class ^(io.github.alainm23.planify)$
windowrule = float true,match:class ^(io.gitlab.adhami3310.Impression)$
windowrule = float true,match:class ^(io.gitlab.theevilskeleton.Upscaler)$
windowrule = float true,match:class ^(io.missioncenter.MissionCenter)$
windowrule = float true,match:class ^(net.davidotek.pupgui2)$
windowrule = float true,match:class ^(nwg-displays)$
windowrule = float true,match:class ^(org.wezfurlong.wezterm)$
windowrule = float true,match:class ^(Signal)$
windowrule = float true,match:class ^(yad)$
windowrule = float true,match:class ^(zoom)$
windowrule = float true,match:initial_class ^(zoom)$

# Workaround for JetBrains IDEs dropdowns/popups
windowrule = no_initial_focus true,match:class ^(.*jetbrains.*)$,match:title ^(win[0-9]+)$

# Positioning
windowrule = center on,match:class ^(org.wezfurlong.wezterm)$

# Zoom specifics
windowrule = pin on,match:title ^(Choose one of the audio conference options),match:class ^(zoom)$

# xwaylandvideobridge tweaks
windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    max_size = 1 1
    no_anim = true
    no_blur = true
    no_focus = true
    no_initial_focus = true
    opacity = 0.0 override
}

# Move to specific workspaces
windowrule {
    name = spotify_to_workspace
    match:class = ^(.*[Ss]potify.*)$

    workspace = name:prim4 silent
}

windowrule {
    name = claude_to_workspace
    match:class = ^(.*[Cc]laude.*)$

    workspace = name:sec4
}

# Float window rules
windowrule {
    name = update_packages
    match:class = ^(com.mitchellh.ghostty)$
    match:initial_title = ^(System Update)$

    center = on
    float = on
    size = (monitor_w*0.6) (monitor_h*0.8)
}

windowrule {
    name = screenshow_annotate_tool
    match:class = ^(com.gabm.satty)$
    match:initial_title = ^(satty)$

    center = on
    float = on
    size = (monitor_w*0.8) (monitor_h*0.8)
}
