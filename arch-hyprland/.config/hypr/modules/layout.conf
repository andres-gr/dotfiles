# ── General layout ─────────────────────────────────────────────────────────────
general {
    border_size = 2
    col.active_border = rgba(bd93f9ff) rgba(ff79c6ff) 45deg
    col.inactive_border = rgba(44475aaa)
    extend_border_grab_area = 12
    gaps_in = 8
    gaps_out = 12
    layout = dwindle
    resize_on_border = true
}

dwindle {
    preserve_split = true
    pseudotile = true
}

# ── Decoration / blur ─────────────────────────────────────────────────────────
decoration {
    rounding = 8

    blur {
        enabled = true
        ignore_opacity = true
        passes = 2
        size = 6
        xray = false
    }
}
