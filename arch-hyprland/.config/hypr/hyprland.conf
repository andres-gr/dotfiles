# arch-hyprland — neo-dots bare stub
# STUB: Customize for your hardware and workflow.
# See: https://wiki.hyprland.org/Configuring/

################
### MONITORS ###
################

# TODO: replace with your monitor layout
# Example: monitor = DP-1, 2560x1440@144, 0x0, 1
monitor = ,preferred,auto,1

####################
### PROGRAMS     ###
####################

$terminal = ghostty
$fileManager = nemo
$menu = rofi -show drun

#################
### AUTOSTART  ###
#################

exec-once = waybar
exec-once = hypridle
exec-once = swaync

####################
### LOOK & FEEL  ###
####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(bd93f9ff) rgba(ff79c6ff) 45deg
    col.inactive_border = rgba(44475aaa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.95
    blur {
        enabled = true
        size = 6
        passes = 3
    }
}

animations {
    enabled = true
    bezier = easeOut, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 4, easeOut
    animation = fade, 1, 3, default
    animation = workspaces, 1, 4, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

##############
### INPUT  ###
##############

input {
    kb_layout = us
    kb_variant = altgr-intl
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

####################
### KEYBINDINGS  ###
####################

$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod SHIFT, Space, togglefloating
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Screenshot
bind = , Print, exec, grim - | wl-copy

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

