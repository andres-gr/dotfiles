# Noctalia hyprland binds
# Generated from niri binds.kdl

# Unbind conflicting keys first (to override base binds)
unbind = $altMod, SPACE
unbind = $altCtrlMod, DELETE
unbind = , XF86AudioRaiseVolume
unbind = , XF86AudioLowerVolume
unbind = , XF86AudioMute
unbind = , XF86AudioMicMute
unbind = , XF86AudioPlay
unbind = , XF86AudioPause
unbind = , XF86AudioNext
unbind = , XF86AudioPrev

# 8. APPLICATION LAUNCHERS
bind = $altMod,           SPACE,                 exec,    qs -c noctalia-shell ipc call launcher toggle                     #"Application Launcher"
bind = $mainMod,          S,                     exec,    qs -c noctalia-shell ipc call controlCenter toggle                #"Control Center"
bind = $mainShiftMod,     S,                     exec,    qs -c noctalia-shell ipc call launcher emoji                      #"Emoji Picker"
bind = $mainMod,          V,                     exec,    qs -c noctalia-shell ipc call launcher clipboard                  #"Clipboard Manager"
bind = $mainShiftMod,     BACKSPACE,             exec,    qs -c noctalia-shell ipc call sessionMenu toggle                  #"Power Menu: Toggle"
bind = $mainMod,          N,                     exec,    qs -c noctalia-shell ipc call notifications toggleHistory         #"Notification Center"

# 9. SECURITY
bind = $mainAltCtrlMod,   L,                     exec,    qs -c noctalia-shell ipc call lockScreen lock                     #"Lock Screen"
bind = $altCtrlShiftMod,  L,                     exec,    qs -c noctalia-shell ipc call sessionMenu lockAndSuspend          #"Lock & Suspend"
bind = $altCtrlMod,       DELETE,                exec,    qs -c noctalia-shell ipc call systemMonitor toggle                #"System Monitor"

# 10. AUDIO CONTROLS
bindel = ,                XF86AudioRaiseVolume,  exec,    qs -c noctalia-shell ipc call volume increase                     #"Raise Volume"
bindel = ,                XF86AudioLowerVolume,  exec,    qs -c noctalia-shell ipc call volume decrease                     #"Lower Volume"
bind = ,                  XF86AudioMute,         exec,    qs -c noctalia-shell ipc call volume muteOutput                   #"Mute Audio"
bind = ,                  XF86AudioMicMute,      exec,    qs -c noctalia-shell ipc call volume muteInput                    #"Mute Mic"
bind = ,                  XF86AudioPlay,         exec,    qs -c noctalia-shell ipc call media playPause                     #"Play/Pause Audio"
bind = ,                  XF86AudioPause,        exec,    qs -c noctalia-shell ipc call media playPause                     #"Play/Pause Audio"
bind = ,                  XF86AudioNext,         exec,    qs -c noctalia-shell ipc call media next                          #"Next Track"
bind = ,                  XF86AudioPrev,         exec,    qs -c noctalia-shell ipc call media previous                      #"Previous Track"

# 11. BRIGHTNESS CONTROLS
bindel = ,                XF86MonBrightnessUp,    exec,   qs -c noctalia-shell ipc call brightness increase                 #"Increase Brightness"
bindel = ,                XF86MonBrightnessDown,  exec,   qs -c noctalia-shell ipc call brightness decrease                 #"Decrease Brightness"

# 12. MISC
bind = $mainAltCtrlMod,   BACKSLASH,              exec,   qs -c noctalia-shell ipc call idleInhibitor toggle                #"Toggle Idle Inhibitor"
bind = $mainMod,          SLASH,                  exec,   qs -c noctalia-shell ipc call plugin:keybind-cheatsheet toggle    #"Toggle Keybinds Cheatsheet"
