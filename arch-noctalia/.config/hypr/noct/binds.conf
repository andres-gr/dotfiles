# Noctalia hyprland binds
# Generated from niri binds.kdl

# Unbind conflicting keys first (to override base binds)
unbind = ALT, SPACE
unbind = ALT CTRL, DELETE
unbind = , XF86AudioRaiseVolume
unbind = , XF86AudioLowerVolume
unbind = , XF86AudioMute
unbind = , XF86AudioMicMute
unbind = , XF86AudioPlay
unbind = , XF86AudioPause
unbind = , XF86AudioNext
unbind = , XF86AudioPrev

# 8. Application Launchers
bind = ALT,               SPACE,                  exec,    qs -c noctalia-shell ipc call launcher toggle                    #"Application Launcher"
bind = $mod,              S,                      exec,    qs -c noctalia-shell ipc call controlCenter toggle               #"Control Center"
bind = $mod SHIFT,        S,                      exec,    qs -c noctalia-shell ipc call launcher emoji                     #"Emoji Picker"
bind = $mod,              V,                      exec,    qs -c noctalia-shell ipc call launcher clipboard                 #"Clipboard Manager"
bind = $mod SHIFT,        BACKSPACE,              exec,    qs -c noctalia-shell ipc call sessionMenu toggle                 #"Power Menu: Toggle"
bind = $mod,              N,                      exec,    qs -c noctalia-shell ipc call notifications toggleHistory        #"Notification Center"

# 9. Security
bind = $mod ALT CTRL,     L,                      exec,    qs -c noctalia-shell ipc call lockScreen lock                    #"Lock Screen"
bind = ALT CTRL SHIFT,    L,                      exec,    qs -c noctalia-shell ipc call sessionMenu lockAndSuspend         #"Lock & Suspend"
bind = ALT CTRL,          DELETE,                 exec,    qs -c noctalia-shell ipc call systemMonitor toggle               #"System Monitor"

# 5. Audio Controls
bindel = ,                XF86AudioRaiseVolume,   exec,    qs -c noctalia-shell ipc call volume increase                    #"Raise Volume"
bindel = ,                XF86AudioLowerVolume,   exec,    qs -c noctalia-shell ipc call volume decrease                    #"Lower Volume"
bindl = ,                 XF86AudioMute,          exec,    qs -c noctalia-shell ipc call volume muteOutput                  #"Mute Audio"
bindl = ,                 XF86AudioMicMute,       exec,    qs -c noctalia-shell ipc call volume muteInput                   #"Mute Mic"
bindl = ,                 XF86AudioPlay,          exec,    qs -c noctalia-shell ipc call media playPause                    #"Play Audio"
bindl = ,                 XF86AudioPause,         exec,    qs -c noctalia-shell ipc call media playPause                    #"Pause Audio"
bindl = ,                 XF86AudioNext,          exec,    qs -c noctalia-shell ipc call media next                         #"Next Track"
bindl = ,                 XF86AudioPrev,          exec,    qs -c noctalia-shell ipc call media previous                     #"Previous Track"

# 11. Brightness Controls
bindel = ,                XF86MonBrightnessUp,    exec,   qs -c noctalia-shell ipc call brightness increase                 #"Increase Brightness"
bindel = ,                XF86MonBrightnessDown,  exec,   qs -c noctalia-shell ipc call brightness decrease                 #"Decrease Brightness"

# 12. Misc Noctalia
bind = $mod ALT CTRL,     BACKSLASH,              exec,   qs -c noctalia-shell ipc call idleInhibitor toggle                #"Toggle Idle Inhibitor"
bind = $mod,              SLASH,                  exec,   qs -c noctalia-shell ipc call plugin:keybind-cheatsheet toggle    #"Toggle Keybinds Cheatsheet"
