env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
}

monitor=desc:{{main_monitor}},2560x1440@120.0,2560x0,1.0
monitor=desc:{{secondary_monitor}},disable

workspace=1,monitor:desc:{{main_monitor}},default:true,persistent:true

exec-once = sddm-greeter-qt6 --socket $WAYLAND_DISPLAY

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = hyprctl --batch 'dispatch workspace 1; dispatch movecursortocorner 1'
