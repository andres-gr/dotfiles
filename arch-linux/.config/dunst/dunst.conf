# dunst.conf — personal layout & behaviour overrides
#
# OWNERSHIP BOUNDARY:
#   This file owns: geometry, text, icons, history, mouse, misc behaviour.
#   HyDE wallbash owns: colors (urgency_low/normal via dunst.dcol),
#                       corner_radius, icon_corner_radius, dmenu path,
#                       icon_theme (all injected by dunst.sh at theme-switch).
#
# See dunst(5) for all options.

[global]

    ### Display ###
    follow = mouse

    ### Geometry ###
    width = (400, 500)
    height = 300
    origin = top-right
    offset = 20x20
    scale = 0
    notification_limit = 20

    ### Progress bar ###
    progress_bar = true
    progress_bar_height = 10
    progress_bar_frame_width = 0
    progress_bar_min_width = 125
    progress_bar_max_width = 250
    progress_bar_corner_radius = 4

    # corner_radius and icon_corner_radius are set by HyDE's dunst.sh
    # icon_corner_radius = ${hypr_border}
    # corner_radius = ${hypr_border}

    indicate_hidden = yes
    transparency = 10
    separator_height = 2
    padding = 8
    horizontal_padding = 8
    text_icon_padding = 10
    frame_width = 3
    gap_size = 5
    separator_color = auto
    sort = yes

    ### Text ###
    font = mononoki Nerd Font 10
    line_height = 3
    markup = full
    format = "%s\n%b"
    alignment = left
    vertical_alignment = center
    show_age_threshold = 60
    ellipsize = middle
    ignore_newline = no
    stack_duplicates = true
    hide_duplicate_count = false
    show_indicators = yes

    ### Icons ###
    # icon_theme and icon_corner_radius set by HyDE's dunst.sh at runtime
    icon_position = left
    min_icon_size = 32
    max_icon_size = 128

    ### History ###
    sticky_history = yes
    history_length = 20

    ### Misc ###
    # dmenu set by HyDE's dunst.sh at runtime
    browser = /usr/bin/xdg-open
    always_run_script = true
    title = Dunst
    class = Dunst
    ignore_dbusclose = false

    ### Wayland ###
    force_xwayland = false

    ### Mouse ###
    mouse_left_click = context, close_current
    mouse_middle_click = do_action, close_current
    mouse_right_click = close_all

[experimental]
    per_monitor_dpi = false

# ── Urgency rules ─────────────────────────────────────────────────────────────
# urgency_low and urgency_normal are generated by HyDE wallbash (dunst.dcol).
# urgency_critical is ours — red is universal, wallbash doesn't override it.

[urgency_critical]
    background = "#f5e0dc"
    foreground = "#1e1e2e"
    frame_color = "#f38ba8"
    timeout = 0
