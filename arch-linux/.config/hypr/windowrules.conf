# windowrules.conf — personal window rules
# Syntax: Hyprland v0.53+ windowrule (replaces windowrulev2)
# See https://wiki.hyprland.org/Configuring/Window-Rules/

# ── Opacity ───────────────────────────────────────────────────────────────────
windowrule = opacity 0.90 0.90, class:^(chrome-)
windowrule = opacity 0.90 0.90, class:^(Chromium)$
windowrule = opacity 0.90 0.90, class:^(chromium)$
windowrule = opacity 0.90 0.90, class:^(Docker Desktop)$
windowrule = opacity 0.90 0.90, class:^(firefoxdeveloperedition)$
windowrule = opacity 0.90 0.90, class:^(Slack)$

windowrule = opacity 0.85 0.85, class:^(org.kde.ark)$
windowrule = opacity 0.85 0.85, class:^(org.kde.dolphin)$
windowrule = opacity 0.85 0.85, class:^(Spotify)$

windowrule = opacity 0.80 0.80, class:^(foot)$
windowrule = opacity 0.80 0.80, class:^(io.github.TheWisker.Cavasik)$
windowrule = opacity 0.80 0.80, class:^(nwg-displays)$
windowrule = opacity 0.80 0.80, class:^(org.wezfurlong.wezterm)$

# ── Floating ──────────────────────────────────────────────────────────────────
windowrule = float, class:^(firefoxdeveloperedition)$, title:^(Library)$
windowrule = float, class:^(nwg-displays)$
windowrule = float, class:^(org.wezfurlong.wezterm)$
windowrule = float, class:^(zoom)$
windowrule = float, initialClass:^(zoom)$

# ── Positioning ───────────────────────────────────────────────────────────────
windowrule = center 1, class:^(org.wezfurlong.wezterm)$

# ── Zoom specifics ────────────────────────────────────────────────────────────
windowrule = pin, title:^(Choose one of the audio conference options), class:^(zoom)$

# ── Media players ─────────────────────────────────────────────────────────────
windowrule = maximize, class:^(mpv)$
windowrule = maximize, class:^(vlc)$, title:^(VLC media player)$

# ── xwaylandvideobridge — keep invisible and out of the way ───────────────────
windowrule = opacity 0.0 0.0, class:^(xwaylandvideobridge)$
windowrule = noanim, class:^(xwaylandvideobridge)$
windowrule = noinitialfocus, class:^(xwaylandvideobridge)$
windowrule = maxsize 1 1, class:^(xwaylandvideobridge)$
windowrule = noblur, class:^(xwaylandvideobridge)$
