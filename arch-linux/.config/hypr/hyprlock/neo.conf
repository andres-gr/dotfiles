# neo.conf — personal hyprlock layout
# Layout preserved from old hyprdots setup.
# All colors driven by HyDE's wallbash engine — no hardcoded values.
#
# To activate: set theme.conf to → source = ./neo.conf

$fontFamily = LigaOperatorMono Nerd Font

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# BACKGROUND
# $BACKGROUND_PATH is set by HyDE's swww/wallpaper engine at theme-switch time
background {
    monitor =
    path = $BACKGROUND_PATH
    blur_passes = 2
    blur_size = 3
    brightness = 0.8000
    contrast = 1.3000
    noise = 0.0117
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# CLOCK — centered, large
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H:%M:%S") </big></b>"
    color = $wallbash_4xa7_rgba
    font_size = 64
    font_family = $fontFamily
    position = 0, 16
    halign = center
    valign = center
}

# USER GREETING — just below the clock
label {
    monitor =
    text = Hey <span text_transform="capitalize" size="larger">$USER</span>
    color = $wallbash_3xa8_rgba
    font_size = 20
    font_family = $fontFamily
    position = 0, -56
    halign = center
    valign = center
}

# HINT — above the input field
label {
    monitor =
    text = Type to unlock!
    color = $wallbash_2xa7_rgba
    font_size = 16
    font_family = $fontFamily
    position = 0, 140
    halign = center
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.64
    dots_center = true
    outer_color = $wallbash_1xa5_rgba
    inner_color = $wallbash_pry2_rgba
    font_color = $wallbash_txt1_rgba
    check_color = $wallbash_4xa8_rgba
    fail_color = rgba(204, 34, 34, 1.0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = -1
    position = 0, 80
    halign = center
    valign = bottom
}
