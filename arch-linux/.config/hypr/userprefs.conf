# userprefs.conf — personal Hyprland overrides
# Edit this file freely. HyDE sources it from hyprland.conf.
# See https://wiki.hyprland.org/Configuring for reference.

source = ./user/workspaces.conf   # Workspace-to-monitor assignments
source = ./user/hyprtasking.conf  # Hyprland tasking

# ── Input ─────────────────────────────────────────────────────────────────────
input {
    kb_variant = altgr-intl
    repeat_rate = 40
    repeat_delay = 250
    sensitivity = -0.4

    touchpad {
        natural_scroll = no
    }
}

# ── General layout ─────────────────────────────────────────────────────────────
general {
    border_size = 2
    extend_border_grab_area = 12
    gaps_in = 8
    gaps_out = 12
}

# ── Decoration / blur ─────────────────────────────────────────────────────────
decoration {
    blur {
        enabled = true
        ignore_opacity = true
        passes = 2
        size = 6
        xray = false
    }
}

# ── Gestures ──────────────────────────────────────────────────────────────────
gestures {
#   workspace_swipe = true
#   workspace_swipe_fingers = 3
}

# ── Misc ──────────────────────────────────────────────────────────────────────
misc {
    allow_session_lock_restore = true
    animate_mouse_windowdragging = true
    disable_hyprland_logo = false
    force_default_wallpaper = 3
    key_press_enables_dpms = true
    mouse_move_enables_dpms = true
    on_focus_under_fullscreen = 1

    # Enable window swallowing (terminal → app)
    # enable_swallow = true
    # swallow_regex = (foot|org.wezfurlong.wezterm|ghostty|Ghostty)
}

# ── Environment ───────────────────────────────────────────────────────────────
# GPU device order — card1 preferred, card0 as fallback (dual-GPU setup)
env = WLR_DRM_DEVICES,/dev/dri/card1

# ── Ecosystem ─────────────────────────────────────────────────────────────────
ecosystem {
    # no_update_news = true
}
