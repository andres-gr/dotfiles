# workspaces.conf — workspace-to-monitor assignments
# Workspaces 1-4 on right monitor (VG27AQ3A), 5-8 on left (VG27AQL1A).
# persistent:true ensures workspaces exist from Hyprland startup,
# even before any window is opened on them.

workspace=1,monitor:desc:ASUSTek COMPUTER INC VG27AQ3A S2LMAS007481,default:true,persistent:true
workspace=2,monitor:desc:ASUSTek COMPUTER INC VG27AQ3A S2LMAS007481,persistent:true
workspace=3,monitor:desc:ASUSTek COMPUTER INC VG27AQ3A S2LMAS007481,persistent:true
workspace=4,monitor:desc:ASUSTek COMPUTER INC VG27AQ3A S2LMAS007481,persistent:true
workspace=5,monitor:desc:ASUSTek COMPUTER INC VG27AQL1A M2LMQS047771,default:true,persistent:true
workspace=6,monitor:desc:ASUSTek COMPUTER INC VG27AQL1A M2LMQS047771,persistent:true
workspace=7,monitor:desc:ASUSTek COMPUTER INC VG27AQL1A M2LMQS047771,persistent:true
workspace=8,monitor:desc:ASUSTek COMPUTER INC VG27AQL1A M2LMQS047771,persistent:true
