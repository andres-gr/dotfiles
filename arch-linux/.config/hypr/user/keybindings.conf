# keybindings.conf — neo-dots personal keybindings
# Extends HyDE's default keybindings — do not source HyDE's keybindings.conf
# alongside this file or binds will duplicate.
# $scrPath is set by HyDE's environment to ~/.local/lib/hyde
# See https://wiki.hyprland.org/Configuring/Binds/

# ── Modifier ──────────────────────────────────────────────────────────────────
$mainMod = SUPER

# ── Applications ──────────────────────────────────────────────────────────────
$term       = ghostty
$altTerm    = kitty
$browser    = zen-browser-bin
$altBrowser = chromium
$editor     = code --ozone-platform-hint=wayland --enable-features=UseOzonePlatform
$file       = dolphin

# ── Window / session actions ──────────────────────────────────────────────────
bindd = $mainMod,       Q,           Close focused window,      exec, $scrPath/dontkillsteam.sh
bindd = ALT,            F4,          Close focused window,      exec, $scrPath/dontkillsteam.sh
bindd = $mainMod CTRL,  Delete,      Kill Hyprland session,     exit,
bindd = $mainMod,       W,           Toggle float,              togglefloating,
bindd = $mainMod,       G,           Toggle group,              togglegroup,
bindd = $mainMod,       Return,      Fullscreen (no bar),       fullscreen, 1
bindd = $mainMod SHIFT, Return,      Fullscreen,                fullscreen, 0
bindd = $mainMod CTRL,  Q,           Lock screen,               exec, pidof hyprlock || hyprlock
bindd = $mainMod CTRL,  Return,      Pin window,                exec, $scrPath/windowpin.sh
bindd = $mainMod SHIFT, BackSpace,   Logout menu,               exec, $scrPath/logoutlaunch.sh 1
bindd = CTRL,           Escape,      Toggle waybar,             exec, killall waybar || waybar
bindd = $mainMod SHIFT, N,           Center window,             centerwindow, 1
bindd = $mainMod SHIFT, M,           Maximize window,           resizeactive, exact 99% 95%
bindd = $mainMod SHIFT, M,           Maximize window (center),  centerwindow, 1
bindd = $mainMod SHIFT, B,           Half window,               resizeactive, exact 50% 70%
bindd = $mainMod SHIFT, B,           Half window (center),      centerwindow, 1
# Unbind HyDE's Super+J (togglesplit) — we use j for movefocus
unbind = $mainMod, J
bindd = $mainMod SHIFT, J,           Toggle split,              togglesplit

# ── Application shortcuts ──────────────────────────────────────────────────
bindd = $mainMod,       T,           Terminal,                  exec, $term
bindd = $mainMod CTRL,  T,           Alt terminal,              exec, $altTerm
bindd = $mainMod,       E,           File manager,              exec, $file
bindd = $mainMod,       C,           Editor,                    exec, $editor
bindd = $mainMod,       F,           Browser,                   exec, $browser
bindd = $mainMod CTRL,  F,           Alt browser,               exec, $altBrowser
bindd = CTRL SHIFT,     Escape,      System monitor,            exec, $scrPath/sysmonlaunch.sh

# ── Rofi launchers ────────────────────────────────────────────────────────────
bindd = ALT,            Space,       App launcher,              exec, pkill -x rofi || $scrPath/rofilaunch.sh d
bindd = $mainMod,       Tab,         Window switcher,           exec, pkill -x rofi || $scrPath/rofilaunch.sh w
bindd = $mainMod,       Space,       File search,               exec, pkill -x rofi || $scrPath/rofilaunch.sh f
bindd = $mainMod,       V,           Clipboard,                 exec, pkill -x rofi || $scrPath/cliphist.sh -c
bindd = $mainMod SHIFT, V,           Clipboard manager,         exec, pkill -x rofi || $scrPath/cliphist.sh
bindd = $mainMod,       slash,       Keybinds hint,             exec, pkill -x rofi || $scrPath/keybinds_hint.sh c
bindd = $mainMod,       comma,       Emoji picker,              exec, pkill -x rofi || $scrPath/emoji-picker.sh
bindd = $mainMod,       period,      Glyph picker,              exec, pkill -x rofi || $scrPath/glyph-picker.sh

# ── Audio ──────────────────────────────────────────────────────────────────
bindl  = , XF86AudioMute,        exec, $scrPath/volumecontrol.sh -o m
bindl  = , XF86AudioMicMute,     exec, $scrPath/volumecontrol.sh -i m
bindel = , XF86AudioLowerVolume, exec, $scrPath/volumecontrol.sh -o d
bindel = , XF86AudioRaiseVolume, exec, $scrPath/volumecontrol.sh -o i

# ── Media controls ─────────────────────────────────────────────────────────────
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioPause, exec, playerctl play-pause
bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPrev,  exec, playerctl previous

# ── Brightness ────────────────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, $scrPath/brightnesscontrol.sh i
bindel = , XF86MonBrightnessDown, exec, $scrPath/brightnesscontrol.sh d

# ── Screenshots ───────────────────────────────────────────────────────────────
bindd = $mainMod,       Print,       Screenshot region,          exec, $scrPath/screenshot.sh s
bindd = $mainMod SHIFT, Print,       Screenshot region (freeze), exec, $scrPath/screenshot.sh sf
bindd = $mainMod CTRL,  Print,       Screenshot monitor,         exec, $scrPath/screenshot.sh m
bindd = ,               Print,       Screenshot all monitors,    exec, $scrPath/screenshot.sh p
bindd = $mainMod SHIFT, P,           Color picker,               exec, hyprpicker -a

# ── HyDE utilities ──────────────────────────────────────────────────────────────
bindd = $mainMod ALT,   G,           Gamemode toggle,            exec, $scrPath/gamemode.sh
bindd = $mainMod ALT,   Right,       Next wallpaper,             exec, $scrPath/swwwallpaper.sh -n
bindd = $mainMod ALT,   Left,        Prev wallpaper,             exec, $scrPath/swwwallpaper.sh -p
bindd = $mainMod ALT,   Up,          Next waybar layout,         exec, $scrPath/wbarconfgen.sh n
bindd = $mainMod ALT,   Down,        Prev waybar layout,         exec, $scrPath/wbarconfgen.sh p
bindd = $mainMod SHIFT, W,           Wallpaper picker,           exec, pkill -x rofi || $scrPath/swwwallselect.sh
bindd = $mainMod SHIFT, T,           Theme picker,               exec, pkill -x rofi || $scrPath/themeselect.sh
bindd = $mainMod SHIFT, A,           Rofi select,                exec, pkill -x rofi || $scrPath/rofiselect.sh
bindd = $mainMod SHIFT, R,           Wallbash mode,              exec, pkill -x rofi || $scrPath/wallbashtoggle.sh -m
bindd = $mainMod,       K,           Switch keyboard layout,     exec, $scrPath/keyboardswitch.sh

# ── Focus (vim-style + arrows) ─────────────────────────────────────────────────
bindd = $mainMod, h,     Move focus left,  movefocus, l
bindd = $mainMod, l,     Move focus right, movefocus, r
bindd = $mainMod, k,     Move focus up,    movefocus, u
bindd = $mainMod, j,     Move focus down,  movefocus, d
bindd = $mainMod, left,  Move focus left,  movefocus, l
bindd = $mainMod, right, Move focus right, movefocus, r
bindd = $mainMod, up,    Move focus up,    movefocus, u
bindd = $mainMod, down,  Move focus down,  movefocus, d

# ── Move window (vim-style) ────────────────────────────────────────────────────
bindd = $mainMod SHIFT, h, Move window left,  movewindow, l
bindd = $mainMod SHIFT, l, Move window right, movewindow, r
bindd = $mainMod SHIFT, k, Move window up,    movewindow, u
bindd = $mainMod SHIFT, j, Move window down,  movewindow, d

# ── Move window float-aware (arrow keys) ─────────────────────────────────
$moveactive = grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive
binded = $mainMod SHIFT CTRL, left,  Move window left,  exec, $moveactive -30 0 || hyprctl dispatch movewindow l
binded = $mainMod SHIFT CTRL, right, Move window right, exec, $moveactive  30 0 || hyprctl dispatch movewindow r
binded = $mainMod SHIFT CTRL, up,    Move window up,    exec, $moveactive  0 -30 || hyprctl dispatch movewindow u
binded = $mainMod SHIFT CTRL, down,  Move window down,  exec, $moveactive  0  30 || hyprctl dispatch movewindow d

# ── Resize window (vim-style + arrows) ──────────────────────────────────────────
binde = $mainMod CTRL,  h,     resizeactive, -30 0
binde = $mainMod CTRL,  l,     resizeactive,  30 0
binde = $mainMod CTRL,  k,     resizeactive,  0 -30
binde = $mainMod CTRL,  j,     resizeactive,  0  30
binde = $mainMod SHIFT, right, resizeactive,  30 0
binde = $mainMod SHIFT, left,  resizeactive, -30 0
binde = $mainMod SHIFT, up,    resizeactive,  0 -30
binde = $mainMod SHIFT, down,  resizeactive,  0  30

# ── Group navigation ─────────────────────────────────────────────────────────────
bindd = $mainMod CTRL, H, Prev group window, changegroupactive, b
bindd = $mainMod CTRL, L, Next group window, changegroupactive, f

# ── Workspaces ───────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ── Move window to workspace ────────────────────────────────────────────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Move window to workspace silently ────────────────────────────────────────
bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4
bind = $mainMod ALT, 5, movetoworkspacesilent, 5
bind = $mainMod ALT, 6, movetoworkspacesilent, 6
bind = $mainMod ALT, 7, movetoworkspacesilent, 7
bind = $mainMod ALT, 8, movetoworkspacesilent, 8
bind = $mainMod ALT, 9, movetoworkspacesilent, 9
bind = $mainMod ALT, 0, movetoworkspacesilent, 10

# ── Relative workspace navigation ────────────────────────────────────────────
bindd = $mainMod CTRL,     Right, Next workspace,          workspace, r+1
bindd = $mainMod CTRL,     Left,  Prev workspace,          workspace, r-1
bindd = $mainMod CTRL,     Down,  First empty workspace,   workspace, empty
bindd = $mainMod CTRL ALT, Right, Move to next workspace,  movetoworkspace, r+1
bindd = $mainMod CTRL ALT, Left,  Move to prev workspace,  movetoworkspace, r-1

# ── Special workspace (scratchpad) ────────────────────────────────────────────
bindd = $mainMod SHIFT, grave, Move to scratchpad,        movetoworkspace,       special
bindd = $mainMod ALT,   grave, Move to scratchpad silent, movetoworkspacesilent, special
bindd = $mainMod,       grave, Toggle scratchpad,         togglespecialworkspace,

# ── Scroll / mouse ───────────────────────────────────────────────────────────────
bind  = $mainMod, mouse_down, workspace, e+1
bind  = $mainMod, mouse_up,   workspace, e-1
bindm = $mainMod, mouse:272,  movewindow
bindm = $mainMod, mouse:273,  resizewindow