# user/keybindings.conf — neo-dots keybind extensions and overrides
# Sourced after HyDE's keybindings.conf via userprefs.conf.
# Only contains: unbinds, new binds, changed commands.
# HyDE covers everything else — no duplicates here.
# $scrPath is set by HyDE's environment to ~/.local/lib/hyde

# ── App variables ─────────────────────────────────────────────────────────────
$mainMod    = SUPER
$term       = ghostty
$altTerm    = kitty
$browser    = zen-browser-bin
$altBrowser = chromium
$editor     = code --ozone-platform-hint=wayland --enable-features=UseOzonePlatform
$file       = dolphin

# ── Unbinds — remove HyDE defaults we are replacing ──────────────────────────
unbind = $mainMod, J          # HyDE: togglesplit — we use j for movefocus
unbind = $mainMod, P          # HyDE: screenshot region — moved to Print key
unbind = $mainMod CTRL, P     # HyDE: screenshot frozen — moved to Super+Ctrl+Print
unbind = $mainMod ALT, P      # HyDE: screenshot monitor — moved to Super+Ctrl+Print
unbind = $mainMod SHIFT, E    # HyDE: rofi file explorer — we use Super+E for file manager
unbind = ALT, Return          # HyDE: fullscreen — we use Super+Return variants
unbind = $mainMod, L          # HyDE: swaylock — we use Super+Ctrl+Q for hyprlock
unbind = $mainMod SHIFT, F    # HyDE: windowpin — we use Super+Ctrl+Return
unbind = $mainMod, Backspace  # HyDE: logoutlaunch — we use Super+Shift+BackSpace
unbind = $mainMod, Delete     # HyDE: exit — we use Super+Ctrl+Delete

# ── Window / session actions (new or changed) ─────────────────────────────────
bindd = $mainMod,       Return,      Fullscreen (no bar),       fullscreen, 1
bindd = $mainMod SHIFT, Return,      Fullscreen,                fullscreen, 0
bindd = $mainMod CTRL,  Delete,      Kill Hyprland session,     exit,
bindd = $mainMod CTRL,  Q,           Lock screen,               exec, pidof hyprlock || hyprlock
bindd = $mainMod CTRL,  Return,      Pin window,                exec, $scrPath/windowpin.sh
bindd = $mainMod SHIFT, BackSpace,   Logout menu,               exec, $scrPath/logoutlaunch.sh 1
bindd = CTRL,           Escape,      Toggle waybar,             exec, killall waybar || waybar
bindd = $mainMod SHIFT, N,           Center window,             centerwindow, 1
bindd = $mainMod SHIFT, M,           Maximize window,           resizeactive, exact 99% 95%
bindd = $mainMod SHIFT, M,           Maximize (center),         centerwindow, 1
bindd = $mainMod SHIFT, B,           Half window,               resizeactive, exact 50% 70%
bindd = $mainMod SHIFT, B,           Half window (center),      centerwindow, 1
bindd = $mainMod SHIFT, J,           Toggle split,              togglesplit

# ── Application shortcuts (new: alt variants) ────────────────────────────────
bindd = $mainMod CTRL, T, Alt terminal, exec, $altTerm
bindd = $mainMod CTRL, F, Alt browser,  exec, $altBrowser

# ── Screenshots (remapped from Super+P to Print key) ────────────────────────
bindd = $mainMod,       Print, Screenshot region,          exec, $scrPath/screenshot.sh s
bindd = $mainMod SHIFT, Print, Screenshot region (freeze), exec, $scrPath/screenshot.sh sf
bindd = $mainMod CTRL,  Print, Screenshot monitor,         exec, $scrPath/screenshot.sh m
bindd = ,               Print, Screenshot all monitors,    exec, $scrPath/screenshot.sh p
bindd = $mainMod SHIFT, P,     Color picker,               exec, hyprpicker -a

# ── Focus (vim-style — new, HyDE only has arrow keys) ──────────────────────────
bindd = $mainMod, h, Move focus left,  movefocus, l
bindd = $mainMod, l, Move focus right, movefocus, r
bindd = $mainMod, k, Move focus up,    movefocus, u
bindd = $mainMod, j, Move focus down,  movefocus, d

# ── Move window (vim-style — new) ────────────────────────────────────────────────
bindd = $mainMod SHIFT, h, Move window left,  movewindow, l
bindd = $mainMod SHIFT, l, Move window right, movewindow, r
bindd = $mainMod SHIFT, k, Move window up,    movewindow, u
bindd = $mainMod SHIFT, j, Move window down,  movewindow, d

# ── Resize window (vim-style — new, HyDE only has arrow keys) ──────────────────
binde = $mainMod CTRL, h, resizeactive, -30 0
binde = $mainMod CTRL, l, resizeactive,  30 0
binde = $mainMod CTRL, k, resizeactive,  0 -30
binde = $mainMod CTRL, j, resizeactive,  0  30