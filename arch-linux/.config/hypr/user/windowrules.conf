# windowrules.conf — personal window rules
# Syntax: Hyprland v0.53+ windowrule with match: prefix

# ── Opacity ───────────────────────────────────────────────────────────────────
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^([Cc]hromium)$
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^([Ss]lack)$
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^([Ss]potify)$
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^(com.mitchellh.ghostty)$
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^(Docker Desktop)$
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^(firefoxdeveloperedition)$
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^(io.github.TheWisker.Cavasik)$
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^(nwg-displays)$
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^(org.kde.ark)$
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^(org.kde.dolphin)$
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^(org.wezfurlong.wezterm)$
windowrule = opacity 0.95 $& 0.85 $& 1,match:class ^(zen)$

# ── Floating ──────────────────────────────────────────────────────────────────
windowrule = float true,match:class ^(firefoxdeveloperedition)$,match:title ^(Library)$
windowrule = float true,match:class ^(nwg-displays)$
windowrule = float true,match:class ^(org.wezfurlong.wezterm)$
windowrule = float true,match:class ^(zoom)$
windowrule = float true,match:initial_class ^(zoom)$

# ── Positioning ───────────────────────────────────────────────────────────────
windowrule = center on,match:class ^(org.wezfurlong.wezterm)$

# ── Zoom specifics ────────────────────────────────────────────────────────────
windowrule = pin on,match:title ^(Choose one of the audio conference options),match:class ^(zoom)$

# ── Media players ─────────────────────────────────────────────────────────────
windowrule = maximize on,match:class ^(mpv)$
windowrule = maximize on,match:class ^(vlc)$,match:title ^(VLC media player)$

# ── xwaylandvideobridge ───────────────────────────────────────────────────────
windowrule {
    name = neo_xwaylandvideobridge
    match:class = ^(xwaylandvideobridge)$
    opacity = 0.0 0.0
    no_anim = true
    no_initial_focus = true
    no_blur = true
}
