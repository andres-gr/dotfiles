$wm=Window Management
$d=[$wm|Monitors]

bindd = $mainMod,         I,    $d Focus Left Monitor,                      focusmonitor,   l
bindd = $mainMod,         O,    $d Focus Right Monitor,                     focusmonitor,   r

bindd = $mainMod SHIFT,   I,    $d Move Window To Left Monitor,             movewindow,     mon:l
bindd = $mainMod SHIFT,   O,    $d Move Window To Right Monitor,            movewindow,     mon:r

bindd = $mainMod ALT,     I,    $d Move Window To Left Monitor (Silent),    movewindow,     mon:l silent
bindd = $mainMod ALT,     O,    $d Move Window To Right Monitor (Silent),   movewindow,     mon:r silent

$d=#! unset the group name
