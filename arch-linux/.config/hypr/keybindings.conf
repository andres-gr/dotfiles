# keybindings.conf — personal keybindings
# $scrPath is set by HyDE's environment to ~/.local/lib/hyde
# See https://wiki.hyprland.org/Configuring/Binds/

# ── Modifier ──────────────────────────────────────────────────────────────────
$mainMod = SUPER

# ── Applications ──────────────────────────────────────────────────────────────
$term     = ghostty
$altTerm  = kitty
$browser  = zen-browser-bin
$altBrowser = chromium
$editor   = code --ozone-platform-hint=wayland --enable-features=UseOzonePlatform
$file     = dolphin

# ── Window / session actions ──────────────────────────────────────────────────
bind = $mainMod,       Q,      exec,       $scrPath/dontkillsteam.sh
bind = ALT,            F4,     exec,       $scrPath/dontkillsteam.sh
bind = $mainMod CTRL,  Delete, exit,
bind = $mainMod,       W,      togglefloating,
bind = $mainMod,       G,      togglegroup,
bind = $mainMod,       Return, fullscreen,       1
bind = $mainMod SHIFT, Return, fullscreen,       0
bind = $mainMod CTRL,  Q,      exec,       pidof hyprlock || hyprlock
bind = $mainMod CTRL,  Return, exec,       $scrPath/windowpin.sh
bind = $mainMod SHIFT, BackSpace, exec,    $scrPath/logoutlaunch.sh 1
bind = CTRL,           Escape, exec,       killall waybar || waybar
bind = $mainMod SHIFT, N,      centerwindow,     1
bind = $mainMod SHIFT, M,      resizeactive,     exact 99% 95%
bind = $mainMod SHIFT, M,      centerwindow,     1
bind = $mainMod SHIFT, B,      resizeactive,     exact 50% 70%
bind = $mainMod SHIFT, B,      centerwindow,     1

# ── Application shortcuts ─────────────────────────────────────────────────────
bind = $mainMod,       T,      exec,   $term
bind = $mainMod CTRL,  T,      exec,   $altTerm
bind = $mainMod,       E,      exec,   $file
bind = $mainMod,       C,      exec,   $editor
bind = $mainMod,       F,      exec,   $browser
bind = $mainMod CTRL,  F,      exec,   $altBrowser
bind = CTRL SHIFT,     Escape, exec,   $scrPath/sysmonlaunch.sh

# ── Rofi launchers ────────────────────────────────────────────────────────────
bind = ALT,        Space, exec, pkill -x rofi || $scrPath/rofilaunch.sh d
bind = $mainMod,   Tab,   exec, pkill -x rofi || $scrPath/rofilaunch.sh w
bind = $mainMod,   Space, exec, pkill -x rofi || $scrPath/rofilaunch.sh f

# ── Audio ─────────────────────────────────────────────────────────────────────
bindl  = , XF86AudioMute,        exec, $scrPath/volumecontrol.sh -o m
bindel = , XF86AudioLowerVolume, exec, $scrPath/volumecontrol.sh -o d
bindel = , XF86AudioRaiseVolume, exec, $scrPath/volumecontrol.sh -o i
bindl  = , XF86AudioMicMute,     exec, $scrPath/volumecontrol.sh -i m
bindel = , XF86AudioPrev,        exec, $scrPath/mediaplayer.py --prev
bindl  = , XF86AudioPlay,        exec, $scrPath/mediaplayer.py --play
bindl  = , XF86AudioNext,        exec, $scrPath/mediaplayer.py --next

# ── Brightness ───────────────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, $scrPath/brightnesscontrol.sh i
bindel = , XF86MonBrightnessDown, exec, $scrPath/brightnesscontrol.sh d

# ── Screenshots ───────────────────────────────────────────────────────────────
bind = $mainMod,       Print, exec, $scrPath/screenshot.sh s   # region snip
bind = $mainMod SHIFT, Print, exec, $scrPath/screenshot.sh sf  # region snip + freeze
bind = $mainMod CTRL,  Print, exec, $scrPath/screenshot.sh m   # active monitor
bind = ,               Print, exec, $scrPath/screenshot.sh p   # active window

# ── HyDE utilities ────────────────────────────────────────────────────────────
bind = $mainMod ALT, G,    exec, $scrPath/gamemode.sh
bind = $mainMod ALT, Right,exec, $scrPath/swwwallpaper.sh -n   # next wallpaper
bind = $mainMod ALT, Left, exec, $scrPath/swwwallpaper.sh -p   # prev wallpaper
bind = $mainMod ALT, Up,   exec, $scrPath/wbarconfgen.sh n     # next waybar layout
bind = $mainMod ALT, Down, exec, $scrPath/wbarconfgen.sh p     # prev waybar layout
bind = $mainMod SHIFT, W,  exec, $scrPath/swwwallselect.sh     # wallpaper picker
bind = $mainMod SHIFT, T,  exec, $scrPath/themeselect.sh       # theme picker
bind = $mainMod SHIFT, A,  exec, $scrPath/rofiselect.sh        # rofi select

# ── Focus ─────────────────────────────────────────────────────────────────────
bind = $mainMod, Left,  movefocus, l
bind = $mainMod, Right, movefocus, r
bind = $mainMod, Up,    movefocus, u
bind = $mainMod, Down,  movefocus, d

# ── Move window ───────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, Left,  movewindow, l
bind = $mainMod SHIFT, Right, movewindow, r
bind = $mainMod SHIFT, Up,    movewindow, u
bind = $mainMod SHIFT, Down,  movewindow, d

# ── Resize window ─────────────────────────────────────────────────────────────
binde = $mainMod CTRL, Left,  resizeactive, -30 0
binde = $mainMod CTRL, Right, resizeactive,  30 0
binde = $mainMod CTRL, Up,    resizeactive,  0 -30
binde = $mainMod CTRL, Down,  resizeactive,  0  30

# ── Workspaces ────────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Scroll through workspaces on monitor ──────────────────────────────────────
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── Move / resize with mouse ──────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
