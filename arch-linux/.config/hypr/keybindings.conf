## в–Ҳв–„в–Җ в–Ҳв–Җв–Җ в–Ҳв–„в–Ҳ в–Ҳв–„в–„ в–Ҳ в–Ҳв–„в–‘в–Ҳ в–Ҳв–Җв–„ в–Ҳ в–Ҳв–„в–‘в–Ҳ в–Ҳв–Җв–Җ в–Ҳв–Җ
## в–Ҳв–‘в–Ҳ в–Ҳв–Ҳв–„ в–‘в–Ҳв–‘ в–Ҳв–„в–Ҳ в–Ҳ в–Ҳв–‘в–Җв–Ҳ в–Ҳв–„в–Җ в–Ҳ в–Ҳв–‘в–Җв–Ҳ в–Ҳв–„в–Ҳ в–„в–Ҳ

# see https://wiki.hyprland.org/configuring/keywords/ for more
# example binds, see https://wiki.hyprland.org/configuring/binds/ for more

#? ------- KEYBINDS_HYPRLAND_V_0_53 COMPATIBLE ----------------
#   This Config is compatible with keybinding changes in Hyprland v0.53+

#? ------- Grouping of binds for easier management ----------------
#  $d=[Group Name|Subgroup Name1|Subgroup Name2|...]

#? ------- Variables ----------------
$TERMINAL       = ghostty
$ALT_TERMINAL   = kitty
$BROWSER        = zen-browser
$ALT_BROWSER    = chromium
$EDITOR         = code --ozone-platform-hint=wayland --enable-features=UseOzonePlatform
$EXPLORER       = dolphin


# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Window Management
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

$wm=Window Management
$d=[$wm]

bindd = $mainMod,         Q,          $d Close Focused Window,            exec,            hyde-shell dontkillsteam
bindd = ALT,              F4,         $d Close Focused Window,            exec,            hyde-shell dontkillsteam
bindd = $mainMod CTRL,    DELETE,     $d Kill Session,                    exec,            hyde-shell logout
bindd = $mainMod,         W,          $d Toggle Floating,                 togglefloating
bindd = $mainMod,         G,          $d Toggle Group,                    togglegroup
bindd = SHIFT,            F11,        $d Toggle Fullscreen,               fullscreen
bindd = $mainMod,         RETURN,     $d Fullscreen (No Bar),             fullscreen,      1
bindd = $mainMod SHIFT,   RETURN,     $d Fullscreen,                      fullscreen,      0
bindd = $mainMod CTRL,    Q,          $d Lock Screen,                     exec,            hyde-shell lock-session
bindd = $mainMod CTRL,    RETURN,     $d Pin Window,                      exec,            hyde-shell windowpin
bindd = $mainMod SHIFT,   BACKSPACE,  $d Logout Menu,                     exec,            hyde-shell logoutlaunch
bindd = CTRL,             ESCAPE,     $d Toggle Waybar,                   exec,            hyde-shell waybar --hide
bindd = $mainMod SHIFT,   N,          $d Center Window,                   centerwindow,    1
bindd = $mainMod SHIFT,   M,          $d Maximize Window,                 resizeactive,    exact 95% 90%
bindd = $mainMod SHIFT,   M,          $d Maximize Window (Center),        centerwindow,    1
bindd = $mainMod SHIFT,   B,          $d Half Window,                     resizeactive,    exact 50% 70%
bindd = $mainMod SHIFT,   B,          $d Half Window (Center),            centerwindow,    1


$d=[$wm|Group Navigation]

bindd = $mainMod CTRL,    H,          $d Change Active Group Backwards,   changegroupactive, b
bindd = $mainMod CTRL,    L,          $d Change Active Group Forwards,    changegroupactive, f


$d=[$wm|Change Focus]

bindd = $mainMod,         LEFT,       $d Focus Left,                      movefocus,       l
bindd = $mainMod,         RIGHT,      $d Focus Right,                     movefocus,       r
bindd = $mainMod,         UP,         $d Focus Up,                        movefocus,       u
bindd = $mainMod,         DOWN,       $d Focus Down,                      movefocus,       d
bindd = ALT,              TAB,        $d Cycle Focus,                     cyclenext
bindd = SHIFT ALT,        TAB,        $d Cycle Focus,                     cyclenext,       prev
bindd = $mainMod,         H,          $d Focus Left,                      movefocus,       l
bindd = $mainMod,         L,          $d Focus Right,                     movefocus,       r
bindd = $mainMod,         K,          $d Focus Up,                        movefocus,       u
bindd = $mainMod,         J,          $d Focus Down,                      movefocus,       d


$d=[$wm|Move Window]

bindd = $mainMod SHIFT,   H,          $d Move Window Left,                movewindow,      l
bindd = $mainMod SHIFT,   L,          $d Move Window Right,               movewindow,      r
bindd = $mainMod SHIFT,   K,          $d Move Window Up,                  movewindow,      u
bindd = $mainMod SHIFT,   J,          $d Move Window Down,                movewindow,      d


$d=[$wm|Resize Active Window]

bindde = $mainMod SHIFT,  RIGHT,      $d Resize Window Right,             resizeactive,    30 0
bindde = $mainMod SHIFT,  LEFT,       $d Resize Window Left,              resizeactive,    -30 0
bindde = $mainMod SHIFT,  UP,         $d Resize Window Up,                resizeactive,    0 -30
bindde = $mainMod SHIFT,  DOWN,       $d Resize Window Down,              resizeactive,    0 30
bindde = $mainMod CTRL,   H,          $d Resize Window Left,              resizeactive,    -30 0
bindde = $mainMod CTRL,   L,          $d Resize Window Right,             resizeactive,    30 0
bindde = $mainMod CTRL,   K,          $d Resize Window Up,                resizeactive,    0 -30
bindde = $mainMod CTRL,   J,          $d Resize Window Down,              resizeactive,    0 30


$d=[$wm|Move Active Window Across Workspace]
$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive

bindde = $mainMod SHIFT CTRL, LEFT,   $d Move Active Window Left,         exec,            $moveactivewindow -30 0 || hyprctl dispatch movewindow l
bindde = $mainMod SHIFT CTRL, RIGHT,  $d Move Active Window Right,        exec,            $moveactivewindow 30 0 || hyprctl dispatch movewindow r
bindde = $mainMod SHIFT CTRL, UP,     $d Move Active Window Up,           exec,            $moveactivewindow 0 -30 || hyprctl dispatch movewindow u
bindde = $mainMod SHIFT CTRL, DOWN,   $d Move Active Window Down,         exec,            $moveactivewindow 0 30 || hyprctl dispatch movewindow d


$d=[$wm|Move & Resize With Mouse]

binddm = $mainMod,        mouse:272,  $d Hold To Move Window,             movewindow
binddm = $mainMod,        mouse:273,  $d Hold To Resize Window,           resizewindow
binddm = $mainMod,        Z,          $d Hold To Move Window,             movewindow
binddm = $mainMod SHIFT,  Z,          $d Hold To Resize Window,           resizewindow


$d=[$wm|Split Layout]

bindd = $mainMod ALT,     BACKSLASH,  $d Toggle Split,                    togglesplit



$d=[$wm|Split Layout]

bindd = $mainMod,         U,          $d Toggle Opacity,                  exec,            hyprctl setprop active opaque toggle

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Launcher
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

$l=Launcher
$d=[$l|Apps]

bindd = $mainMod,         T,          $d Terminal,                        exec,            $TERMINAL
bindd = $mainMod CTRL,    T,          $d Alt Terminal,                    exec,            $ALT_TERMINAL
bindd = $mainMod ALT,     T,          $d Dropdown Terminal,               exec,            hyde-shell pypr toggle console
bindd = $mainMod,         E,          $d File Explorer,                   exec,            $EXPLORER
bindd = $mainMod,         C,          $d Text Editor,                     exec,            $EDITOR
bindd = $mainMod,         B,          $d Browser,                         exec,            $BROWSER
bindd = $mainMod CTRL,    B,          $d Alt Browser,                     exec,            $ALT_BROWSER
bindd = CTRL SHIFT,       ESCAPE,     $d System Monitor,                  exec,            hyde-shell system.monitor


$d=[$l|Rofi Menus]
$rofi_launch=hyde-shell rofilaunch

bindd = ALT,              SPACE,      $d Application Finder,              exec,            pkill -x rofi || $rofi_launch d
bindd = $mainMod,         TAB,        $d Window Switcher,                 exec,            pkill -x rofi || $rofi_launch w
bindd = $mainMod SHIFT,   E,          $d File Finder,                     exec,            pkill -x rofi || $rofi_launch f
bindd = $mainMod,         SLASH,      $d Keybindings Hint,                exec,            pkill -x rofi || hyde-shell keybinds_hint c
bindd = $mainMod CTRL,    COMMA,      $d Emoji Picker,                    exec,            pkill -x rofi || hyde-shell emoji-picker
bindd = $mainMod CTRL,    PERIOD,     $d Glyph Picker,                    exec,            pkill -x rofi || hyde-shell glyph-picker
bindd = $mainMod,         V,          $d Clipboard,                       exec,            pkill -x rofi || hyde-shell cliphist -c
bindd = $mainMod SHIFT,   V,          $d Clipboard Manager,               exec,            pkill -x rofi || hyde-shell cliphist
bindd = $mainMod SHIFT,   A,          $d Select Rofi Launcher,            exec,            pkill -x rofi || hyde-shell rofiselect


# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Hardware Controls
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

$hc=Hardware Controls
$d=[$hc|Audio]

binddl  = ,               XF86AudioMute,        $d Toggle Mute Output,      exec,          hyde-shell volumecontrol -o m
binddl  = ,               XF86AudioMicMute,     $d Toggle Mute Microphone,  exec,          hyde-shell volumecontrol -i m
binddel = ,               XF86AudioLowerVolume, $d Decrease Volume,         exec,          hyde-shell volumecontrol -o d
binddel = ,               XF86AudioRaiseVolume, $d Increase Volume,         exec,          hyde-shell volumecontrol -o i


$d=[$hc|Media]

binddl  = ,               XF86AudioPlay,        $d Play Media,              exec,          playerctl play-pause
binddl  = ,               XF86AudioPause,       $d Pause Media,             exec,          playerctl play-pause
binddl  = ,               XF86AudioNext,        $d Next Media,              exec,          playerctl next
binddl  = ,               XF86AudioPrev,        $d Previous Media,          exec,          playerctl previous


$d=[$hc|Brightness]

binddel = ,               XF86MonBrightnessUp,   $d Increase Brightness,    exec,          hyde-shell brightnesscontrol i
binddel = ,               XF86MonBrightnessDown, $d Decrease Brightness,    exec,          hyde-shell brightnesscontrol d


# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Utilities
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

$ut=Utilities
$d=[$ut]

binddl = $mainMod CTRL,   APOSTROPHE,   $d Toggle Keyboard Layout,          exec,            hyde-shell keyboardswitch
bindd  = $mainMod ALT,    G,            $d Game Mode,                       exec,            hyde-shell gamemode
bindd  = $mainMod SHIFT,  G,            $d Open Game Launcher,              exec,            hyde-shell gamelauncher


$d=[$ut|Screen Capture]

bindd  = $mainMod,        PRINT,      $d Snip Screen,                     exec,            hyde-shell screenshot s
bindd  = $mainMod SHIFT,  PRINT,      $d Freeze And Snip,                 exec,            hyde-shell screenshot sf
binddl = $mainMod CTRL,   PRINT,      $d Print Monitor,                   exec,            hyde-shell screenshot m
binddl = ,                PRINT,      $d Print All Monitors,              exec,            hyde-shell screenshot p
bindd  = $mainMod CTRL,   P,          $d Color Picker,                    exec,            hyprpicker -an


# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Theming And Wallpaper
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

$rice=Theming And Wallpaper
$d=[$rice]

bindd = $mainMod ALT,     RIGHT,      $d Next Global Wallpaper,           exec,            hyde-shell wallpaper -Gn
bindd = $mainMod ALT,     LEFT,       $d Previous Global Wallpaper,       exec,            hyde-shell wallpaper -Gp
bindd = $mainMod SHIFT,   W,          $d Select A Global Wallpaper,       exec,            pkill -x rofi || hyde-shell wallpaper -SG
bindd = $mainMod ALT,     UP,         $d Next Waybar Layout,              exec,            hyde-shell wbarconfgen n
bindd = $mainMod ALT,     DOWN,       $d Previous Waybar Layout,          exec,            hyde-shell wbarconfgen p
bindd = $mainMod SHIFT,   R,          $d Wallbash Mode Selector,          exec,            pkill -x rofi || hyde-shell wallbashtoggle -m
bindd = $mainMod SHIFT,   T,          $d Select A Theme,                  exec,            pkill -x rofi || hyde-shell themeselect
bindd = $mainMod SHIFT,   Y,          $d Select Animations,               exec,            pkill -x rofi || hyde-shell animations --select
bindd = $mainMod SHIFT,   U,          $d Select Hyprlock Layout,          exec,            pkill -x rofi || hyde-shell hyprlock --select


# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Workspaces
# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

$ws=Workspaces
$d=[$ws|Navigation]

bindd = $mainMod,         1,          $d Navigate To Workspace 1,         workspace,       1
bindd = $mainMod,         2,          $d Navigate To Workspace 2,         workspace,       2
bindd = $mainMod,         3,          $d Navigate To Workspace 3,         workspace,       3
bindd = $mainMod,         4,          $d Navigate To Workspace 4,         workspace,       4
bindd = $mainMod,         5,          $d Navigate To Workspace 5,         workspace,       5
bindd = $mainMod,         6,          $d Navigate To Workspace 6,         workspace,       6
bindd = $mainMod,         7,          $d Navigate To Workspace 7,         workspace,       7
bindd = $mainMod,         8,          $d Navigate To Workspace 8,         workspace,       8
bindd = $mainMod,         9,          $d Navigate To Workspace 9,         workspace,       9
bindd = $mainMod,         0,          $d Navigate To Workspace 10,        workspace,       10
bindd = $mainMod CTRL,    RIGHT,      $d Next Workspace,                  workspace,       m+1
bindd = $mainMod CTRL,    LEFT,       $d Previous Workspace,              workspace,       m-1
bindd = $mainMod CTRL,    DOWN,       $d Nearest Empty Workspace,         workspace,       empty
bindd = $mainMod,         mouse_down, $d Next Workspace,                  workspace,       m-1
bindd = $mainMod,         mouse_up,   $d Previous Workspace,              workspace,       m+1
bindd = $mainMod,         PERIOD,     $d Next Workspace,                  workspace,       m+1
bindd = $mainMod,         COMMA,      $d Previous Workspace,              workspace,       m-1


$d=[$ws|Move Window To Workspace]

bindd = $mainMod SHIFT,     1,          $d Move To Workspace 1,             movetoworkspace, 1
bindd = $mainMod SHIFT,     2,          $d Move To Workspace 2,             movetoworkspace, 2
bindd = $mainMod SHIFT,     3,          $d Move To Workspace 3,             movetoworkspace, 3
bindd = $mainMod SHIFT,     4,          $d Move To Workspace 4,             movetoworkspace, 4
bindd = $mainMod SHIFT,     5,          $d Move To Workspace 5,             movetoworkspace, 5
bindd = $mainMod SHIFT,     6,          $d Move To Workspace 6,             movetoworkspace, 6
