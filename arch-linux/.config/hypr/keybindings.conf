bindd = $mainMod,         X,          $d Send to minimized workspace,     movetoworkspacesilent,    special:minimized
bindd = $mainMod SHIFT,   X,          $d Toggle minimized workspace,      togglespecialworkspace,   minimized
bindd = $mainMod CTRL,    X,          $d Move from minimized workspace,   movetoworkspace,          +0

