# windowrules.conf — personal window rules
# Syntax: Hyprland v0.53+ windowrule with match: prefix

# ── Layer Rules ───────────────────────────────────────────────────────────────

# swaync notification popup window is anchored top+bottom by GTK layer shell,
# making it full screen height at the compositor level. ignorealpha makes
# Hyprland treat transparent pixels as click-through and non-rendered.
layerrule {
    name = swaync_notifications
    match:namespace = swaync-notification-window
    ignore_alpha = 0
}

layerrule {
    name = rounded_waybar
    match:namespace = waybar
    blur = on
    ignore_alpha = 0
}

# ── Opacity ───────────────────────────────────────────────────────────────────

# Catch-all default opacity for all other windows
windowrule {
    name = default_opacity
    match:class = ^(.*)$
    opacity = 0.95 override 0.85 override 1 override
}

