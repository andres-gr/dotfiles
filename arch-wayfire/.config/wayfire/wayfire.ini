[alpha]
min_value = 0.100000
modifier = <alt> <super>

[animate]
close_animation = zoom
duration = 400ms sigmoid
enabled_for = (type equals "toplevel" | (type equals "x-or" & focusable equals true))
fade_duration = 400ms circle
fade_enabled_for = type equals "overlay"
fire_color = \#B22303FF
fire_duration = 300ms linear
fire_enabled_for = none
fire_particle_size = 16.000000
fire_particles = 2000
minimize_animation = squeezimize
open_animation = zoom
random_fire_color = false
spin_duration = 250ms linear
spin_rotations = 1
squeezimize_duration = 150ms linear
startup_duration = 600ms circle
zap_duration = 250ms linear
zoom_duration = 500ms circle
zoom_enabled_for = none

[annotate]
clear_workspace = <alt> <super> KEY_C
draw = <alt> <super> BTN_LEFT
from_center = true
line_width = 3.000000
method = draw
stroke_color = \#FF0000FF

[autorotate-iio]
lock_rotation = false
rotate_down = <ctrl> <super> KEY_DOWN
rotate_left = <ctrl> <super> KEY_LEFT
rotate_right = <ctrl> <super> KEY_RIGHT
rotate_up = <ctrl> <super> KEY_UP

[autostart]
#Gtk+3 applications slow startup or .desktop files not opening
#https://github.com/WayfireWM/wayfire/wiki/Tips-&-Tricks#gtk3-applications-slow-startup-or-desktop-files-not-opening
0_env = dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY XAUTHORITY

autostart_wf_shell = false
dock = wf-dock

outputs = kanshi

# XDG desktop portal
# Needed by some GTK applications
portal = /usr/libexec/xdg-desktop-portal

[bench]
average_frames = 25
position = top_center

[blur]
blur_by_default = type is "toplevel"
bokeh_degrade = 1
bokeh_iterations = 15
bokeh_offset = 5.000000
box_degrade = 1
box_iterations = 2
box_offset = 1.000000
gaussian_degrade = 1
gaussian_iterations = 2
gaussian_offset = 1.000000
kawase_degrade = 3
kawase_iterations = 2
kawase_offset = 1.700000
method = kawase
saturation = 1.000000
toggle = none

[command]
binding_terminal = <super> KEY_T
command_terminal = _NO_TMUX=1 exec ghostty -e zsh

binding_yazi = <super> <alt> KEY_Y
command_yazi = exec ghostty -e zsh -c yazi

binding_btop = <ctrl> <shift> KEY_ESC
command_btop = exec ghostty -e zsh -c btop

[core]
background_color = \#1A1A1AFF
close_top_view = <super> KEY_W | <alt> KEY_F4
exit = <alt> <ctrl> <super> KEY_BACKSPACE
focus_button_with_modifiers = false
focus_buttons = BTN_LEFT | BTN_MIDDLE | BTN_RIGHT
focus_buttons_passthrough = true
max_render_time = -1
plugins = alpha animate autostart command cube expo fast-switcher foreign-toplevel grid gtk-shell invert move oswitch place resize session-lock shortcuts-inhibit switcher vswitch wayfire-shell window-rules wobbly zoom scale follow-focus extra-animations wm-actions input-method-v1 ipc
preferred_decoration_mode = client
transaction_timeout = 100
vheight = 1
vwidth = 3
xwayland = true
xwayland_startup_script =

[crosshair]
line_color = \#FF0000FF
line_width = 2

[cube]
activate = <alt> <ctrl> BTN_LEFT
background = \#1A1A1AFF
background_mode = simple
cubemap_image =
deform = 0
initial_animation = 350ms circle
light = true
rotate_left = none
rotate_right = none
skydome_mirror = true
skydome_texture =
